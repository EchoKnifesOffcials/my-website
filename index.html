    <!-- Firebase SDK (Authentication) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBAn0pSAeYVXlpBFElUvFWeCdmMduRDLss",
            authDomain: "echoknifes-5360c.firebaseapp.com",
            projectId: "echoknifes-5360c",
            storageBucket: "echoknifes-5360c.firebasestorage.app",
            messagingSenderId: "86064144525",
            appId: "1:86064144525:web:9a8dee636295e840c242c4"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        window.firebaseAuth = auth;
        window.firebaseProvider = provider;
        window.firebaseSignOut = signOut;
        window.firebaseSignInWithPopup = signInWithPopup;
        
        onAuthStateChanged(auth, (user) => {
            if (window.handleAuthStateChanged) {
                window.handleAuthStateChanged(user);
            }
        });
        
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
    
    <style>

            padding: 0;

        body {

            min-height: 100vh;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;

            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 50%, #0f0c29 0%, #1a1a3e 50%, #0f0c29 100%);
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: -1;
            animation: float 25s infinite ease-in-out;
        }

        .orb-1 { width: 600px; height: 600px; background: #6c5ce7; top: -300px; left: -300px; }
        .orb-2 { width: 500px; height: 500px; background: #a855f7; bottom: -250px; right: -250px; animation-delay: 5s; }
        .orb-3 { width: 400px; height: 400px; background: #ec4899; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 10s; opacity: 0.15; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(108, 92, 231, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 20s infinite linear;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a3e; }
        ::-webkit-scrollbar-thumb { background: #6c5ce7; border-radius: 10px; }

        .header {
            background: rgba(15, 12, 41, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(108, 92, 231, 0.3);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {

            align-items: center;

            transition: transform 0.3s ease;
        }
        .logo:hover { transform: scale(1.02); }

        .logo-icon {

            color: #6c5ce7;
            filter: drop-shadow(0 0 10px rgba(108,92,231,0.5));
        }

        .logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;

        }

        .logo-sub {

        }

        .nav-links {

            top: 0;

            border-radius: 12px;
            color: white;

            top: 0;
            left: 0;

        .roblox-avatar {

        .roblox-input-group {

        .roblox-input {

        .btn-red {

            font-weight: 700;

        .loading-avatar {

            color: #888;

        .receipt-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 5000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .receipt-modal.show { display: flex; }
        .receipt-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 550px;
            border: 1px solid #6c5ce7;
        }
        .receipt-icon { font-size: 60px; color: #10b981; text-align: center; }
        .receipt-details { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin: 15px 0; }
        .system-message-box { background: #0a0a14; padding: 12px; border-radius: 12px; margin: 10px 0; color: #a5f7c0; }

        .chat-support-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 340px;
            background: #0f0f1a;
            border-radius: 20px;
            border: 1px solid #6c5ce7;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }
        .chat-support-panel.open { display: flex; }
        .chat-header {
            background: #6c5ce7;
            padding: 12px 16px;
            border-radius: 20px 20px 0 0;

            justify-content: space-between;
        }
        .chat-messages {
            height: 280px;
            overflow-y: auto;
            padding: 12px;
        }
        .message-buyer { background: #2d2d44; align-self: flex-end; padding: 8px 12px; border-radius: 18px; margin: 5px 0; text-align: right; }
        .message-support { background: #1e1e3a; padding: 8px 12px; border-radius: 18px; margin: 5px 0; }
        .chat-input-area { display: flex; padding: 12px; border-top: 1px solid #2a2a3a; }
        .chat-input { flex: 1; background: #1a1a2e; border: none; padding: 8px 12px; border-radius: 30px; color: white; }
        .chat-send { background: #6c5ce7; border: none; margin-left: 8px; padding: 8px 15px; border-radius: 30px; color: white; cursor: pointer; }

        .toast { position: fixed; bottom: 30px; left: 30px; background: #10b981; padding: 12px 24px; border-radius: 12px; z-index: 2000; transform: translateX(-400px); transition: transform 0.3s; }
        .toast.show { transform: translateX(0); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .overlay.show { display: block; }
    </style>
</head>
<body>

<div class="animated-bg"></div>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>
<div class="particles" id="particles"></div>

<div class="header">
    <div class="logo" onclick="showHome()">
        <i class="fas fa-gem logo-icon"></i>
        <div><div class="logo-text">ECHOKNIVES</div><div class="logo-sub">PREMIUM MM2 SHOP</div></div>
    </div>
    <div class="nav-links">
        <button class="nav-link active" onclick="showHome()">🏠 Home</button>
        <button class="nav-link" onclick="showShop()">🛒 Shop</button>
    </div>
    <div class="top-right">
        <div class="currency-selector"><i class="fas fa-money-bill-wave"></i><select id="currencySelect" onchange="changeCurrency()"><option value="PHP">🇵🇭 PHP</option><option value="USD">🇺🇸 USD</option></select></div>
        <div class="user-info" id="userInfo" onclick="performGoogleLogin()"><div class="user-avatar" id="userAvatarDisplay"><i class="fas fa-user"></i></div><span id="userNameDisplay">Guest</span></div>
        <div class="cart-icon" onclick="toggleCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></div>
    </div>
</div>

<div id="homePage" class="hero">

</div>

    <div class="filter-bar"><button class="filter-btn active" data-filter="all">All</button><button class="filter-btn" data-filter="knife">🔪 Knives</button><button class="filter-btn" data-filter="gun">🔫 Guns</button></div>

<!-- ROBLOX VERIFICATION MODAL -->

<!-- RECEIPT MODAL -->
<div class="receipt-modal" id="receiptModal">

<div class="chat-support-panel" id="chatPanel">

<div class="toast" id="toast"></div>

<script>
    const items = [
        { id: 1, name: "Batwing", type: "knife", price: 152, image: "https://i.imgur.com/H6CL03y.jpeg" },
        { id: 2, name: "Harvester", type: "knife", price: 608, image: "https://i.imgur.com/jZkbQ4t.jpeg" },
        { id: 3, name: "Icewing", type: "knife", price: 72, image: "https://i.imgur.com/jiwvmxq.jpeg" },
        { id: 4, name: "Luger", type: "gun", price: 207, image: "https://i.imgur.com/eEvMBRh.jpeg" },
        { id: 5, name: "Darkbringer", type: "gun", price: 92000, image: "https://i.imgur.com/8oxgzwa.jpeg" },
        { id: 6, name: "Lightbringer", type: "gun", price: 92000, image: "https://i.imgur.com/BUljuYV.jpeg" }
    ];

    let cart = [];
    let currentFilter = "all";
    let isLoggedIn = false;
    let currentUser = null;
    let currentCurrency = "PHP";
    let pendingRobloxUsername = "";
    const exchangeRates = { PHP: 1, USD: 0.017 };
    const symbols = { PHP: "₱", USD: "$" };
    
    function getDisplayPrice(price) { return (price * exchangeRates[currentCurrency]).toFixed(2); }
    function getSymbol() { return symbols[currentCurrency]; }
    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    function changeCurrency() { currentCurrency = document.getElementById('currencySelect').value; renderProducts(); updateCartUI(); }

    function showHome() { document.getElementById('homePage').style.display = 'flex'; document.getElementById('shopPage').style.display = 'none'; }
    function showShop() { document.getElementById('homePage').style.display = 'none'; document.getElementById('shopPage').style.display = 'block'; renderProducts(); }

    function renderProducts() {
        let filtered = items.filter(i => currentFilter === 'all' ? true : i.type === currentFilter);
        document.getElementById('productsGrid').innerHTML = filtered.map(item => `
            <div class="product-card"><div class="product-image"><img src="${item.image}"></div><div class="product-info"><div class="product-name">${item.name}</div><div class="product-price">${getSymbol()}${getDisplayPrice(item.price)}</div><button class="add-btn" onclick="addToCart(${item.id})">Add to Cart</button></div></div>
        `).join('');
    }

    function addToCart(id) { if (!isLoggedIn) { showToast("Please login first"); performGoogleLogin(); return; } const item = items.find(i => i.id === id); const existing = cart.find(i => i.id === id); if (existing) existing.quantity++; else cart.push({ ...item, quantity: 1 }); updateCartUI(); showToast(`${item.name} added`); }
    function updateCartUI() { let total = cart.reduce((s, i) => s + (i.price * i.quantity), 0); const count = cart.reduce((s, i) => s + i.quantity, 0); document.getElementById('cartCount').innerText = count; document.getElementById('cartTotal').innerHTML = `Total: ${getSymbol()}${getDisplayPrice(total)}`; const container = document.getElementById('cartItemsList'); if (cart.length === 0) { container.innerHTML = '<p style="text-align:center;">Cart empty</p>'; return; } container.innerHTML = cart.map(item => `<div style="display:flex; justify-content:space-between; margin-bottom:12px;"><div><strong>${item.name}</strong><br>${getSymbol()}${getDisplayPrice(item.price)} x${item.quantity}</div><div><button onclick="updateQty(${item.id}, ${item.quantity-1})">-</button> <button onclick="updateQty(${item.id}, ${item.quantity+1})">+</button> <button onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i></button></div></div>`).join(''); }
    function updateQty(id, newQty) { if (newQty <= 0) removeFromCart(id); else { const item = cart.find(i => i.id === id); if(item) item.quantity = newQty; updateCartUI(); } }
    function removeFromCart(id) { cart = cart.filter(i => i.id !== id); updateCartUI(); }
    function toggleCart() { document.getElementById('cartSidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
    function closeCart() { document.getElementById('cartSidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

    // Roblox Verification Logic
    let storedRobloxUsername = localStorage.getItem('roblox_username') || '';
    
    function fetchRobloxAvatar(username) {
        return new Promise((resolve) => {
            if (!username) { resolve(null); return; }
            // Using Roblox thumbnail API
            const imgUrl = `https://www.roblox.com/avatar-thumbnail?userId=1&width=120&height=120&format=png`; // Placeholder, but we'll use a better approach
            // For demo, we'll use a dynamic render. Since we can't fetch userId directly without CORS, we'll use a proxy-friendly approach
            // We'll just show a default with username text
            document.getElementById('robloxAvatarImg').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=6c5ce7&color=fff&size=120`;
            document.getElementById('robloxDisplayName').innerText = `@${username}`;
            resolve(true);
        });
    }
    
    function openRobloxVerification() {
        if (!isLoggedIn) { showToast("Please login first"); performGoogleLogin(); return; }
        if (cart.length === 0) { showToast("Your cart is empty"); return; }
        
        const savedUsername = localStorage.getItem('roblox_username') || '';
        document.getElementById('robloxUsernameInput').value = savedUsername;
        
        if (savedUsername) {
            fetchRobloxAvatar(savedUsername);
            pendingRobloxUsername = savedUsername;
        } else {
            document.getElementById('robloxAvatarImg').src = `https://ui-avatars.com/api/?name=Guest&background=6c5ce7&color=fff&size=120`;
            document.getElementById('robloxDisplayName').innerHTML = 'Enter your Roblox username above';
        }
        
        document.getElementById('robloxModal').classList.add('show');
        closeCart();
        
        // Add real-time input preview
        const inputField = document.getElementById('robloxUsernameInput');
        inputField.oninput = function() {
            const val = this.value.trim();
            if (val) {
                document.getElementById('robloxAvatarImg').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(val)}&background=6c5ce7&color=fff&size=120`;
                document.getElementById('robloxDisplayName').innerHTML = `@${val}`;
                pendingRobloxUsername = val;
            } else {
                document.getElementById('robloxAvatarImg').src = `https://ui-avatars.com/api/?name=Guest&background=6c5ce7&color=fff&size=120`;
                document.getElementById('robloxDisplayName').innerHTML = 'Enter your Roblox username';
            }
        };
    }
    
    function resetRobloxUsername() {
        document.getElementById('robloxUsernameInput').value = '';
        document.getElementById('robloxAvatarImg').src = `https://ui-avatars.com/api/?name=Guest&background=6c5ce7&color=fff&size=120`;
        document.getElementById('robloxDisplayName').innerHTML = 'Enter your Roblox username above';
        pendingRobloxUsername = '';
        showToast("Please enter your correct Roblox username");
    }
    
    function confirmRobloxAndCheckout() {
        const username = document.getElementById('robloxUsernameInput').value.trim();
        if (!username) {
            showToast("Please enter your Roblox username");
            return;
        }
        // Save to localStorage for future
        localStorage.setItem('roblox_username', username);
        pendingRobloxUsername = username;
        document.getElementById('robloxModal').classList.remove('show');
        
        // Now proceed to payment gateway with username included
        redirectToPaymentGatewayWithRoblox(username);
    }
    
    function redirectToPaymentGatewayWithRoblox(robloxUser) {
        // Save cart data with roblox username
        const orderData = {
            items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity })),
            total: cart.reduce((s, i) => s + (i.price * i.quantity), 0),
            robloxUsername: robloxUser,
            customerEmail: currentUser?.email || 'guest@example.com',
            timestamp: Date.now()
        };
        sessionStorage.setItem('echoknives_pending_order', JSON.stringify(orderData));
        
        const cartParam = encodeURIComponent(JSON.stringify(orderData.items));
        const returnUrl = encodeURIComponent(window.location.origin + window.location.pathname);
        // Redirect to payment site with roblox username
        window.location.href = `https://echoknivesmm2.onrender.com?cart=${cartParam}&return=${returnUrl}&roblox=${encodeURIComponent(robloxUser)}`;
    }
    
    // Handle return from payment
    function checkPaymentReturn() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('payment') === 'success') {
            const pendingRaw = sessionStorage.getItem('echoknives_pending_order');
            if (pendingRaw) {
                const order = JSON.parse(pendingRaw);
                showReceipt(order);
                sessionStorage.removeItem('echoknives_pending_order');
                cart = [];
                updateCartUI();
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                showToast("Order completed! Please contact support if items not delivered.");
            }
        }
    }
    
    function showReceipt(order) {
        const orderNumber = 'EK-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
        const itemsList = order.items.map(i => `${i.name} x${i.quantity}`).join(', ');
        const total = order.total;
        
        document.getElementById('receiptDetails').innerHTML = `
            <div class="receipt-row"><strong>Order #:</strong> ${orderNumber}</div>
            <div class="receipt-row"><strong>Date:</strong> ${new Date().toLocaleString()}</div>
            <div class="receipt-row"><strong>Items:</strong> ${itemsList}</div>
            <div class="receipt-row"><strong>Total Paid:</strong> ${getSymbol()}${getDisplayPrice(total)}</div>
            <div class="receipt-row"><strong>Roblox User:</strong> @${order.robloxUsername || 'Not specified'}</div>
        `;
        document.getElementById('systemMessageBox').innerHTML = `📢 System: Order #${orderNumber} received. Please wait for delivery (5-15 mins). A support agent is ready to assist you via chat.`;
        localStorage.setItem('lastOrderId', orderNumber);
        document.getElementById('receiptModal').classList.add('show');
        showToast("Order placed successfully!");
    }
    
    function closeReceipt() { document.getElementById('receiptModal').classList.remove('show'); }
    
    // Chat Support
    function openChatSupport() { document.getElementById('chatPanel').classList.add('open'); }
    function closeChatPanel() { document.getElementById('chatPanel').classList.remove('open'); }
    function sendBuyerMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if(!msg) return;
        const msgsDiv = document.getElementById('chatMessages');
        const buyerMsg = document.createElement('div'); buyerMsg.className = 'message-buyer'; buyerMsg.innerText = msg;
        msgsDiv.appendChild(buyerMsg);
        input.value = '';
        msgsDiv.scrollTop = msgsDiv.scrollHeight;
        setTimeout(() => {
            const reply = document.createElement('div'); reply.className = 'message-support';
            reply.innerHTML = `🛡️ Support: Thank you! We'll deliver your items shortly. Order #${localStorage.getItem('lastOrderId') || 'pending'}`;
            msgsDiv.appendChild(reply);
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        }, 1500);
    }
    
    // Auth
    window.handleAuthStateChanged = function(user) {
        if(user) { isLoggedIn = true; currentUser = user; document.getElementById('userNameDisplay').innerText = user.displayName || user.email?.split('@')[0]; document.getElementById('userAvatarDisplay').innerHTML = user.photoURL ? `<img src="${user.photoURL}">` : `<i class="fas fa-user"></i>`; showToast(`Welcome ${user.displayName || 'User'}!`); } 
        else { isLoggedIn = false; currentUser = null; document.getElementById('userNameDisplay').innerText = 'Guest'; document.getElementById('userAvatarDisplay').innerHTML = `<i class="fas fa-user"></i>`; }
        renderProducts();
    };
    async function performGoogleLogin() { if(window.firebaseAuth) { try { await window.firebaseSignInWithPopup(window.firebaseAuth, window.firebaseProvider); } catch(e) { showToast("Login failed"); } } else { showToast("Loading..."); } }
    
    // Filters & Particles
    document.querySelectorAll('.filter-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.dataset.filter; renderProducts(); }); });
    function createParticles() { const container = document.getElementById('particles'); for (let i = 0; i < 60; i++) { const p = document.createElement('div'); p.classList.add('particle'); p.style.width = (Math.random() * 6 + 2) + 'px'; p.style.left = Math.random() * 100 + '%'; p.style.animationDelay = Math.random() * 20 + 's'; p.style.animationDuration = (Math.random() * 15 + 10) + 's'; container.appendChild(p); } }
    createParticles();
    checkPaymentReturn();
    showHome();
    
    window.showHome = showHome; window.showShop = showShop; window.addToCart = addToCart; window.updateQty = updateQty; window.removeFromCart = removeFromCart;
    window.toggleCart = toggleCart; window.closeCart = closeCart; window.changeCurrency = changeCurrency; window.performGoogleLogin = performGoogleLogin;
    window.openRobloxVerification = openRobloxVerification; window.resetRobloxUsername = resetRobloxUsername; window.confirmRobloxAndCheckout = confirmRobloxAndCheckout;
    window.closeReceipt = closeReceipt; window.openChatSupport = openChatSupport; window.closeChatPanel = closeChatPanel; window.sendBuyerMessage = sendBuyerMessage;
    renderProducts();
</script>
</body>
</html>
