<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ECHOKNIVES | Global Trading Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b);
            font-family: 'Inter', sans-serif;
            color: #f0f3fa;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: rgba(10, 20, 35, 0.8);
            backdrop-filter: blur(16px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .logo-icon {
            font-size: 32px;
            color: #00d4ff;
            animation: iconGlow 2s infinite;
        }
        @keyframes iconGlow {
            0%, 100% { filter: drop-shadow(0 0 5px #00d4ff); }
            50% { filter: drop-shadow(0 0 15px #ff6b9d); }
        }
        .logo-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #ff6b9d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 12px;
        }
        .nav-link {
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            color: #a0aec0;
            background: transparent;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background: linear-gradient(135deg, #00d4ff, #ff6b9d);
            color: #0a0e1a;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 5%;
        }

        /* Create Trade Section */
        .create-trade-section {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .section-title {
            font-size: 28px;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #00d4ff, #ff6b9d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .items-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 20px;
        }

        .items-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .add-item-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-item-btn:hover { transform: scale(1.02); }

        .item-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }
        .item-row input {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            outline: none;
        }
        .remove-item {
            background: #ef4444;
            border: none;
            padding: 8px 15px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .roblox-input {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 14px;
            outline: none;
        }

        .message-input {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            outline: none;
            resize: vertical;
            font-family: inherit;
        }

        .submit-trade-btn {
            background: linear-gradient(135deg, #00d4ff, #ff6b9d);
            border: none;
            padding: 14px 35px;
            border-radius: 40px;
            color: #0a0e1a;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: all 0.3s;
        }
        .submit-trade-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4); }

        /* Trades Grid */
        .trades-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .trade-count {
            background: rgba(0, 212, 255, 0.2);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
        }

        .trades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }

        .trade-card {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            transition: all 0.3s;
            animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .trade-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.15);
        }

        .trade-user {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 18px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }
        .trade-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #ff6b9d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .trade-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .trade-user-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }
        .trade-user-info p {
            font-size: 12px;
            color: #00d4ff;
        }

        .trade-items {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .offering-box, .requesting-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 12px;
        }
        .offering-box h4, .requesting-box h4 {
            font-size: 12px;
            color: #a0aec0;
            margin-bottom: 10px;
        }
        .offering-box ul, .requesting-box ul {
            list-style: none;
            padding-left: 0;
        }
        .offering-box li, .requesting-box li {
            padding: 5px 0;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }
        .item-badge {
            background: rgba(0, 212, 255, 0.15);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
        }

        .trade-message {
            background: rgba(0, 212, 255, 0.08);
            border-radius: 14px;
            padding: 12px;
            margin: 15px 0;
            font-size: 13px;
            color: #cbd5e1;
            border-left: 3px solid #00d4ff;
        }

        .trade-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .trade-date {
            font-size: 11px;
            color: #64748b;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-pending { background: #f59e0b; color: #0a0e1a; }
        .status-accepted { background: #10b981; color: white; }
        .status-declined { background: #ef4444; color: white; }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .accept-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
        }
        .decline-btn {
            background: #ef4444;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
        }
        .cancel-btn {
            background: #475569;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
        }
        .roblox-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(15, 25, 45, 0.5);
            border-radius: 32px;
            color: #64748b;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s;
        }
        .toast.show { transform: translateX(0); }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .trades-grid { grid-template-columns: 1fr; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="location.reload()">
        <i class="fas fa-gem logo-icon"></i>
        <div><div class="logo-text">ECHOKNIVES</div><div style="font-size:9px; color:#00d4ff;">GLOBAL TRADING HUB</div></div>
    </div>
    <div class="nav-links">
        <div class="nav-link active" onclick="switchTab('trade')">🌍 Global Trades</div>
        <div class="nav-link" onclick="switchTab('create')">📝 Create Trade</div>
        <div class="nav-link" onclick="openProfile()">👤 Profile</div>
    </div>
</div>

<div class="container">
    <!-- Create Trade Section -->
    <div id="createTradeSection" class="create-trade-section" style="display: none;">
        <div class="section-title"><i class="fas fa-plus-circle"></i> Create New Trade Request</div>
        
        <div class="form-grid">
            <div class="items-panel">
                <div class="items-header">
                    <strong><i class="fas fa-box-open"></i> 📦 Items You're Offering</strong>
                    <button type="button" class="add-item-btn" onclick="addOfferedItem()"><i class="fas fa-plus"></i> Add Item</button>
                </div>
                <div id="offeredItemsContainer">
                    <div class="item-row">
                        <input type="text" placeholder="Item name (e.g., Batwing)" class="offered-name">
                        <input type="number" placeholder="Qty" class="offered-qty" value="1" min="1" style="width: 80px;">
                        <button class="remove-item" onclick="this.parentElement.remove()">Remove</button>
                    </div>
                </div>
            </div>
            
            <div class="items-panel">
                <div class="items-header">
                    <strong><i class="fas fa-gift"></i> 🎯 Items You Want</strong>
                    <button type="button" class="add-item-btn" onclick="addRequestedItem()"><i class="fas fa-plus"></i> Add Item</button>
                </div>
                <div id="requestedItemsContainer">
                    <div class="item-row">
                        <input type="text" placeholder="Item name (e.g., Harvester)" class="requested-name">
                        <input type="number" placeholder="Qty" class="requested-qty" value="1" min="1" style="width: 80px;">
                        <button class="remove-item" onclick="this.parentElement.remove()">Remove</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div style="margin-top: 20px;">
            <input type="text" id="receiverRoblox" class="roblox-input" placeholder="👤 Trade with Roblox Username (required)" style="margin-bottom: 15px;">
            <textarea id="tradeMessage" class="message-input" rows="3" placeholder="💬 Add a message to your trade request..."></textarea>
        </div>
        
        <button class="submit-trade-btn" onclick="submitTrade()"><i class="fas fa-paper-plane"></i> Publish Trade Request</button>
    </div>
    
    <!-- Trades Display Section -->
    <div id="tradesSection">
        <div class="trades-header">
            <div class="section-title"><i class="fas fa-globe-americas"></i> Global Trade Requests</div>
            <div class="trade-count" id="tradeCount">0 active trades</div>
        </div>
        <div id="tradesContainer" class="trades-grid">
            <div class="empty-state"><i class="fas fa-inbox"></i> Loading trades...</div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ========== STORAGE KEYS ==========
    const STORAGE_KEY = 'echoknives_global_trades';
    const USER_KEY = 'echoknives_user';
    
    // ========== USER MANAGEMENT ==========
    function getCurrentUser() {
        let user = localStorage.getItem(USER_KEY);
        if (!user) {
            user = {
                id: 'user_' + Math.random().toString(36).substr(2, 9),
                username: 'Trader_' + Math.floor(Math.random() * 1000),
                robloxUsername: null,
                robloxAvatar: null,
                createdAt: new Date().toISOString()
            };
            localStorage.setItem(USER_KEY, JSON.stringify(user));
        }
        return JSON.parse(user);
    }
    
    function updateRobloxProfile(username) {
        const user = getCurrentUser();
        user.robloxUsername = username;
        user.robloxAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=00d4ff&color=fff&size=100`;
        localStorage.setItem(USER_KEY, JSON.stringify(user));
        return user;
    }
    
    // ========== TRADE MANAGEMENT ==========
    function getAllTrades() {
        const trades = localStorage.getItem(STORAGE_KEY);
        return trades ? JSON.parse(trades) : [];
    }
    
    function saveAllTrades(trades) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(trades));
        // Trigger storage event for cross-tab sync
        window.dispatchEvent(new StorageEvent('storage', { key: STORAGE_KEY, newValue: JSON.stringify(trades) }));
    }
    
    function addTrade(trade) {
        const trades = getAllTrades();
        trades.unshift(trade);
        saveAllTrades(trades);
        return trade;
    }
    
    function updateTradeStatus(tradeId, status, userId) {
        const trades = getAllTrades();
        const tradeIndex = trades.findIndex(t => t.id === tradeId);
        if (tradeIndex === -1) return null;
        
        const trade = trades[tradeIndex];
        // Only receiver or creator can update
        if (trade.receiverRoblox !== userId && trade.creatorId !== userId) return null;
        
        trade.status = status;
        trade.updatedAt = new Date().toISOString();
        saveAllTrades(trades);
        return trade;
    }
    
    function deleteTrade(tradeId, userId) {
        const trades = getAllTrades();
        const trade = trades.find(t => t.id === tradeId);
        if (!trade || trade.creatorId !== userId) return false;
        
        const filtered = trades.filter(t => t.id !== tradeId);
        saveAllTrades(filtered);
        return true;
    }
    
    // ========== CREATE TRADE UI ==========
    function addOfferedItem() {
        const container = document.getElementById('offeredItemsContainer');
        const div = document.createElement('div');
        div.className = 'item-row';
        div.innerHTML = `
            <input type="text" placeholder="Item name" class="offered-name">
            <input type="number" placeholder="Qty" class="offered-qty" value="1" min="1" style="width: 80px;">
            <button class="remove-item" onclick="this.parentElement.remove()">Remove</button>
        `;
        container.appendChild(div);
    }
    
    function addRequestedItem() {
        const container = document.getElementById('requestedItemsContainer');
        const div = document.createElement('div');
        div.className = 'item-row';
        div.innerHTML = `
            <input type="text" placeholder="Item name" class="requested-name">
            <input type="number" placeholder="Qty" class="requested-qty" value="1" min="1" style="width: 80px;">
            <button class="remove-item" onclick="this.parentElement.remove()">Remove</button>
        `;
        container.appendChild(div);
    }
    
    function collectItems(containerId, nameClass, qtyClass) {
        const items = [];
        const rows = document.querySelectorAll(`#${containerId} .item-row`);
        rows.forEach(row => {
            const name = row.querySelector(`.${nameClass}`).value.trim();
            const qty = parseInt(row.querySelector(`.${qtyClass}`).value);
            if (name && qty > 0) {
                items.push({ name, quantity: qty });
            }
        });
        return items;
    }
    
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.style.background = isError ? '#ef4444' : 'linear-gradient(135deg, #10b981, #059669)';
        toast.innerText = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    function submitTrade() {
        const user = getCurrentUser();
        const receiverRoblox = document.getElementById('receiverRoblox').value.trim();
        const message = document.getElementById('tradeMessage').value.trim();
        const offeredItems = collectItems('offeredItemsContainer', 'offered-name', 'offered-qty');
        const requestedItems = collectItems('requestedItemsContainer', 'requested-name', 'requested-qty');
        
        if (!receiverRoblox) {
            showToast('Please enter the Roblox username of who you want to trade with', true);
            return;
        }
        if (offeredItems.length === 0) {
            showToast('Please add at least one item you are offering', true);
            return;
        }
        if (requestedItems.length === 0) {
            showToast('Please add at least one item you want', true);
            return;
        }
        
        const trade = {
            id: Date.now().toString(),
            creatorId: user.id,
            creatorName: user.username,
            creatorRoblox: user.robloxUsername || 'Not verified',
            creatorAvatar: user.robloxAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username)}&background=00d4ff&color=fff&size=100`,
            receiverRoblox: receiverRoblox,
            receiverInfo: null,
            itemsOffered: offeredItems,
            itemsRequested: requestedItems,
            message: message,
            status: 'pending',
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
        };
        
        addTrade(trade);
        showToast('✅ Trade request published globally!');
        
        // Reset form
        document.getElementById('receiverRoblox').value = '';
        document.getElementById('tradeMessage').value = '';
        document.getElementById('offeredItemsContainer').innerHTML = `
            <div class="item-row">
                <input type="text" placeholder="Item name" class="offered-name">
                <input type="number" placeholder="Qty" class="offered-qty" value="1" min="1" style="width: 80px;">
                <button class="remove-item" onclick="this.parentElement.remove()">Remove</button>
            </div>
        `;
        document.getElementById('requestedItemsContainer').innerHTML = `
            <div class="item-row">
                <input type="text" placeholder="Item name" class="requested-name">
                <input type="number" placeholder="Qty" class="requested-qty" value="1" min="1" style="width: 80px;">
                <button class="remove-item" onclick="this.parentElement.remove()">Remove</button>
            </div>
        `;
        
        renderTrades();
        switchTab('trade');
    }
    
    // ========== RENDER TRADES ==========
    function renderTrades() {
        const trades = getAllTrades();
        const container = document.getElementById('tradesContainer');
        const user = getCurrentUser();
        
        document.getElementById('tradeCount').innerHTML = `${trades.length} active trade${trades.length !== 1 ? 's' : ''}`;
        
        if (trades.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-handshake"></i> No active trades. Be the first to create one!</div>`;
            return;
        }
        
        container.innerHTML = trades.map(trade => {
            const isCreator = trade.creatorId === user.id;
            const isReceiver = trade.receiverRoblox.toLowerCase() === (user.robloxUsername || '').toLowerCase();
            const canAct = isReceiver && trade.status === 'pending';
            const canCancel = isCreator && trade.status === 'pending';
            
            return `
                <div class="trade-card">
                    <div class="trade-user">
                        <div class="trade-avatar">
                            ${trade.creatorAvatar ? `<img src="${trade.creatorAvatar}" alt="${trade.creatorName}">` : `<i class="fas fa-user"></i>`}
                        </div>
                        <div class="trade-user-info">
                            <h3>${escapeHtml(trade.creatorName)}</h3>
                            <p><i class="fab fa-roblox"></i> ${escapeHtml(trade.creatorRoblox || 'Not verified')}</p>
                        </div>
                        <span class="status-badge status-${trade.status}">${trade.status.toUpperCase()}</span>
                    </div>
                    
                    <div class="trade-items">
                        <div class="offering-box">
                            <h4><i class="fas fa-arrow-right"></i> Offering</h4>
                            <ul>
                                ${trade.itemsOffered.map(item => `<li><span>${escapeHtml(item.name)}</span><span class="item-badge">x${item.quantity}</span></li>`).join('')}
                            </ul>
                        </div>
                        <div class="requesting-box">
                            <h4><i class="fas fa-arrow-left"></i> Want</h4>
                            <ul>
                                ${trade.itemsRequested.map(item => `<li><span>${escapeHtml(item.name)}</span><span class="item-badge">x${item.quantity}</span></li>`).join('')}
                            </ul>
                        </div>
                    </div>
                    
                    ${trade.message ? `<div class="trade-message"><i class="fas fa-comment-dots"></i> ${escapeHtml(trade.message)}</div>` : ''}
                    
                    <div class="trade-footer">
                        <span class="trade-date"><i class="far fa-clock"></i> ${new Date(trade.createdAt).toLocaleString()}</span>
                        <a href="https://www.roblox.com/user.aspx?username=${encodeURIComponent(trade.receiverRoblox)}" target="_blank" class="roblox-link"><i class="fab fa-roblox"></i> Trade with @${escapeHtml(trade.receiverRoblox)}</a>
                    </div>
                    
                    <div class="action-buttons">
                        ${canAct ? `
                            <button class="accept-btn" onclick="respondToTrade('${trade.id}', 'accepted')"><i class="fas fa-check"></i> Accept Trade</button>
                            <button class="decline-btn" onclick="respondToTrade('${trade.id}', 'declined')"><i class="fas fa-times"></i> Decline</button>
                        ` : ''}
                        ${canCancel ? `
                            <button class="cancel-btn" onclick="cancelTrade('${trade.id}')"><i class="fas fa-trash"></i> Cancel Request</button>
                        ` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function respondToTrade(tradeId, status) {
        const user = getCurrentUser();
        const trades = getAllTrades();
        const trade = trades.find(t => t.id === tradeId);
        
        if (!trade) return;
        if (trade.receiverRoblox.toLowerCase() !== (user.robloxUsername || '').toLowerCase()) {
            showToast('This trade is not addressed to you', true);
            return;
        }
        
        updateTradeStatus(tradeId, status, user.id);
        showToast(status === 'accepted' ? '✅ Trade accepted! Contact the trader on Roblox.' : '❌ Trade declined');
        renderTrades();
    }
    
    function cancelTrade(tradeId) {
        const user = getCurrentUser();
        if (deleteTrade(tradeId, user.id)) {
            showToast('Trade cancelled successfully');
            renderTrades();
        } else {
            showToast('Unable to cancel this trade', true);
        }
    }
    
    function openProfile() {
        const user = getCurrentUser();
        const newRoblox = prompt('Enter your Roblox username to verify:', user.robloxUsername || '');
        if (newRoblox && newRoblox.trim()) {
            updateRobloxProfile(newRoblox.trim());
            showToast(`✅ Roblox account linked: ${newRoblox}`);
            renderTrades();
        }
    }
    
    function switchTab(tab) {
        const createSection = document.getElementById('createTradeSection');
        const tradesSection = document.getElementById('tradesSection');
        const navLinks = document.querySelectorAll('.nav-link');
        
        navLinks.forEach(link => link.classList.remove('active'));
        
        if (tab === 'create') {
            createSection.style.display = 'block';
            tradesSection.style.display = 'none';
            document.querySelector('.nav-links .nav-link:first-child').classList.add('active');
        } else {
            createSection.style.display = 'none';
            tradesSection.style.display = 'block';
            document.querySelector('.nav-links .nav-link:first-child').classList.add('active');
            renderTrades();
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Listen for cross-tab storage events
    window.addEventListener('storage', (e) => {
        if (e.key === STORAGE_KEY) {
            renderTrades();
        }
    });
    
    // Initial render
    renderTrades();
    document.querySelector('.nav-links .nav-link:first-child').classList.add('active');
    
    // Make functions global for inline onclick
    window.addOfferedItem = addOfferedItem;
    window.addRequestedItem = addRequestedItem;
    window.submitTrade = submitTrade;
    window.respondToTrade = respondToTrade;
    window.cancelTrade = cancelTrade;
    window.openProfile = openProfile;
    window.switchTab = switchTab;
</script>
</body>
</html>
