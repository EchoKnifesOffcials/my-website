<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ECHOKNIVES | Premium MM2 Shop</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK (Authentication) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBAn0pSAeYVXlpBFElUvFWeCdmMduRDLss",
            authDomain: "echoknifes-5360c.firebaseapp.com",
            projectId: "echoknifes-5360c",
            storageBucket: "echoknifes-5360c.firebasestorage.app",
            messagingSenderId: "86064144525",
            appId: "1:86064144525:web:9a8dee636295e840c242c4"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        window.firebaseAuth = auth;
        window.firebaseProvider = provider;
        window.firebaseSignOut = signOut;
        window.firebaseSignInWithPopup = signInWithPopup;
        
        onAuthStateChanged(auth, (user) => {
            if (window.handleAuthStateChanged) {
                window.handleAuthStateChanged(user);
            }
        });
        
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #0f0c29 100%); color: #fff; overflow-x: hidden; min-height: 100vh; }
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at 20% 50%, #0f0c29 0%, #1a1a3e 50%, #0f0c29 100%); }
        .glow-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; z-index: -1; animation: float 25s infinite ease-in-out; }
        .orb-1 { width: 600px; height: 600px; background: #6c5ce7; top: -300px; left: -300px; }
        .orb-2 { width: 500px; height: 500px; background: #a855f7; bottom: -250px; right: -250px; animation-delay: 5s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(50px, -50px) scale(1.1); } 66% { transform: translate(-30px, 30px) scale(0.9); } }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .particle { position: absolute; background: rgba(108, 92, 231, 0.3); border-radius: 50%; animation: particleFloat 20s infinite linear; }
        @keyframes particleFloat { 0% { transform: translateY(100vh) translateX(0); opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.5; } 100% { transform: translateY(-100vh) translateX(50px); opacity: 0; } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a3e; }
        ::-webkit-scrollbar-thumb { background: #6c5ce7; border-radius: 10px; }

        .header { background: rgba(15, 12, 41, 0.85); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(108, 92, 231, 0.3); flex-wrap: wrap; gap: 15px; }
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-icon { font-size: 32px; color: #6c5ce7; }
        .logo-text { font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #fff, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 10px; background: rgba(108, 92, 231, 0.1); padding: 5px; border-radius: 50px; }
        .nav-link { padding: 8px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; color: #ccc; background: transparent; border: none; }
        .nav-link:hover, .nav-link.active { background: #6c5ce7; color: white; }
        .top-right { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .points-display { background: linear-gradient(135deg, #f59e0b, #d97706); padding: 8px 16px; border-radius: 40px; display: flex; align-items: center; gap: 8px; font-weight: 700; cursor: pointer; }
        .currency-selector { background: rgba(108, 92, 231, 0.2); border: 1px solid rgba(108, 92, 231, 0.3); border-radius: 30px; padding: 8px 16px; }
        .currency-selector select { background: transparent; border: none; color: white; cursor: pointer; outline: none; }
        .user-info { display: flex; align-items: center; gap: 10px; background: rgba(108, 92, 231, 0.2); border: 1px solid rgba(108, 92, 231, 0.3); padding: 5px 15px; border-radius: 40px; cursor: pointer; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #6c5ce7; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .cart-icon { position: relative; cursor: pointer; background: rgba(108, 92, 231, 0.2); padding: 8px 16px; border-radius: 40px; }
        .cart-count { position: absolute; top: -5px; right: -5px; background: #ef4444; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; }

        .hero { min-height: 85vh; display: flex; align-items: center; justify-content: space-between; padding: 60px 5%; flex-wrap: wrap; gap: 50px; }
        .hero-content { flex: 1; min-width: 300px; animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .hero-title { font-size: 58px; font-weight: 800; font-family: 'Orbitron', monospace; }
        .hero-title span { background: linear-gradient(135deg, #6c5ce7, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a855f7); border: none; padding: 14px 35px; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; }
        .hero-image img { max-width: 100%; filter: drop-shadow(0 0 40px rgba(108,92,231,0.3)); border-radius: 20px; animation: floatImage 4s ease-in-out infinite; }
        @keyframes floatImage { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px 5%; }
        .filter-bar { background: rgba(0,0,0,0.5); padding: 12px 20px; margin-bottom: 25px; border-radius: 50px; display: flex; gap: 10px; overflow-x: auto; }
        .filter-btn { background: rgba(255,255,255,0.1); border: none; padding: 8px 20px; border-radius: 30px; color: white; cursor: pointer; }
        .filter-btn.active { background: #6c5ce7; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .product-card { background: linear-gradient(135deg, rgba(30,20,25,0.9), rgba(20,15,20,0.95)); border-radius: 20px; overflow: hidden; border: 1px solid rgba(108,92,231,0.2); transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-8px); border-color: #6c5ce7; }
        .product-image { padding: 20px; text-align: center; }
        .product-image img { width: 100px; height: 100px; object-fit: contain; }
        .product-info { padding: 18px; text-align: center; }
        .product-name { font-size: 18px; font-weight: 700; }
        .product-price { font-size: 24px; font-weight: 800; color: #6c5ce7; margin: 10px 0; }
        .add-btn { width: 100%; padding: 10px; background: linear-gradient(135deg, #6c5ce7, #a855f7); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; }

        .cart-sidebar { position: fixed; top: 0; right: -450px; width: 450px; height: 100vh; background: rgba(15, 12, 41, 0.98); backdrop-filter: blur(20px); z-index: 1000; transition: right 0.3s; padding: 25px; display: flex; flex-direction: column; border-left: 2px solid #6c5ce7; }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .close-cart { background: none; border: none; font-size: 28px; cursor: pointer; color: #6c5ce7; }
        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .cart-total { margin-top: 20px; padding-top: 15px; border-top: 2px solid #6c5ce7; font-size: 22px; font-weight: 800; }
        .checkout-btn { width: 100%; padding: 15px; background: #10b981; border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; margin-top: 15px; }

        .roblox-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(20px); z-index: 3000; display: none; justify-content: center; align-items: center; }
        .roblox-modal.show { display: flex; }
        .roblox-content { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 30px; padding: 35px; width: 90%; max-width: 500px; text-align: center; border: 1px solid #6c5ce7; }
        .roblox-avatar { width: 100px; height: 100px; border-radius: 50%; background: #1e1e3a; margin: 0 auto 15px; overflow: hidden; border: 3px solid #6c5ce7; }
        .roblox-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .roblox-input { width: 100%; padding: 14px; background: rgba(255,255,255,0.1); border: 1px solid rgba(108,92,231,0.3); border-radius: 60px; color: white; text-align: center; margin: 20px 0; }
        .btn-blue { background: #3b82f6; border: none; padding: 14px; border-radius: 60px; color: white; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-red { background: #ef4444; border: none; padding: 14px; border-radius: 60px; color: white; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }

        .toast { position: fixed; bottom: 30px; left: 30px; background: #10b981; padding: 12px 24px; border-radius: 12px; z-index: 2000; transform: translateX(-400px); transition: transform 0.3s; }
        .toast.show { transform: translateX(0); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .overlay.show { display: block; }

        @media (max-width: 768px) { .cart-sidebar { width: 100%; right: -100%; } .hero-title { font-size: 38px; } .products-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); } }
    </style>
</head>
<body>

<div class="animated-bg"></div>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>
<div class="particles" id="particles"></div>

<div class="header">
    <div class="logo" onclick="showHome()"><i class="fas fa-gem logo-icon"></i><div><div class="logo-text">ECHOKNIVES</div><div class="logo-sub">PREMIUM MM2 SHOP</div></div></div>
    <div class="nav-links"><button class="nav-link active" onclick="showHome()">🏠 Home</button><button class="nav-link" onclick="showShop()">🛒 Shop</button></div>
    <div class="top-right">
        <div class="points-display"><i class="fas fa-star"></i> <span id="pointsBalance">0</span> pts</div>
        <div class="currency-selector"><i class="fas fa-money-bill-wave"></i><select id="currencySelect" onchange="changeCurrency()"><option value="PHP">🇵🇭 PHP</option><option value="USD">🇺🇸 USD</option></select></div>
        <div class="user-info" id="userInfo" onclick="performGoogleLogin()"><div class="user-avatar" id="userAvatarDisplay"><i class="fas fa-user"></i></div><span id="userNameDisplay">Guest</span></div>
        <div class="cart-icon" onclick="toggleCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></div>
    </div>
</div>

<div id="homePage" class="hero">
    <div class="hero-content"><h1 class="hero-title">RARE <span>MM2</span><br>ITEMS</h1><p class="hero-desc" style="color:#aaa; margin:20px 0;">Secure payments, fast delivery, earn points!</p><button class="btn-primary" onclick="showShop()">Shop Now →</button></div>
    <div class="hero-image"><img src="https://i.imgur.com/hP2t6wb.jpeg" alt="MM2 Hero"></div>
</div>

<div id="shopPage" class="container" style="display:none;">
    <div class="filter-bar"><button class="filter-btn active" data-filter="all">All</button><button class="filter-btn" data-filter="knife">🔪 Knives</button><button class="filter-btn" data-filter="gun">🔫 Guns</button></div>
    <div class="products-grid" id="productsGrid"></div>
</div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header"><h3>Your Cart</h3><button class="close-cart" onclick="closeCart()">×</button></div>
    <div class="cart-items" id="cartItemsList"></div>
    <div class="cart-total" id="cartTotal">Total: ₱0</div>
    <button class="checkout-btn" onclick="openRobloxVerification()">Proceed to Checkout →</button>
</div>

<div class="roblox-modal" id="robloxModal">
    <div class="roblox-content">
        <h2><i class="fab fa-roblox"></i> Verify Roblox Account</h2>
        <div class="roblox-avatar"><img id="robloxAvatarImg" src="https://ui-avatars.com/api/?name=Roblox&background=6c5ce7&color=fff&size=100" alt="Avatar"></div>
        <div id="robloxDisplayName" style="font-size:16px; margin-bottom:15px;">Enter your username</div>
        <input type="text" id="robloxUsernameInput" class="roblox-input" placeholder="Roblox Username">
        <button class="btn-blue" onclick="confirmRobloxAndCheckout()">✅ Yes, That's me!</button>
        <button class="btn-red" onclick="closeRobloxModal()">❌ Cancel</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ========== MM2 ITEMS ==========
    const items = [
        { id: 1, name: "Batwing", type: "knife", price: 152, image: "https://i.imgur.com/H6CL03y.jpeg" },
        { id: 2, name: "Harvester", type: "knife", price: 608, image: "https://i.imgur.com/jZkbQ4t.jpeg" },
        { id: 3, name: "Icewing", type: "knife", price: 72, image: "https://i.imgur.com/jiwvmxq.jpeg" },
        { id: 4, name: "Luger", type: "gun", price: 207, image: "https://i.imgur.com/eEvMBRh.jpeg" },
        { id: 5, name: "Darkbringer", type: "gun", price: 92000, image: "https://i.imgur.com/8oxgzwa.jpeg" },
        { id: 6, name: "Lightbringer", type: "gun", price: 92000, image: "https://i.imgur.com/BUljuYV.jpeg" }
    ];

    let cart = [], currentFilter = "all", isLoggedIn = false, currentUser = null, currentCurrency = "PHP", userPoints = 0;
    let exchangeRates = { PHP: 1, USD: 0.017 }, symbols = { PHP: "₱", USD: "$" };
    let verifiedRobloxUser = null;
    const MIDDLEMAN_URL = "https://roblox-middlemanbot1.onrender.com";
    const PAYMENT_URL = "https://echoknivesmm2.onrender.com";

    function getDisplayPrice(p) { return (p * exchangeRates[currentCurrency]).toFixed(2); }
    function getSymbol() { return symbols[currentCurrency]; }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    function changeCurrency() { currentCurrency = document.getElementById('currencySelect').value; renderProducts(); updateCartUI(); }
    function showHome() { document.getElementById('homePage').style.display = 'flex'; document.getElementById('shopPage').style.display = 'none'; }
    function showShop() { document.getElementById('homePage').style.display = 'none'; document.getElementById('shopPage').style.display = 'block'; renderProducts(); }

    function renderProducts() {
        let f = items.filter(i => { if (currentFilter === 'knife') return i.type === 'knife'; if (currentFilter === 'gun') return i.type === 'gun'; return true; });
        document.getElementById('productsGrid').innerHTML = f.map(item => `
            <div class="product-card"><div class="product-image"><img src="${item.image}"></div><div class="product-info"><div class="product-name">${item.name}</div><div class="product-price">${getSymbol()}${getDisplayPrice(item.price)}</div><button class="add-btn" onclick="addToCart(${item.id})">Add to Cart</button></div></div>
        `).join('');
    }

    function addToCart(id) {
        if (!isLoggedIn) { showToast("Login first"); performGoogleLogin(); return; }
        const item = items.find(i => i.id === id);
        const existing = cart.find(i => i.id === id);
        if (existing) existing.quantity++;
        else cart.push({ ...item, quantity: 1 });
        updateCartUI();
        showToast(`${item.name} added`);
    }

    function updateCartUI() {
        let total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
        const count = cart.reduce((s, i) => s + i.quantity, 0);
        document.getElementById('cartCount').innerText = count;
        document.getElementById('cartTotal').innerHTML = `Total: ${getSymbol()}${getDisplayPrice(total)}`;
        const c = document.getElementById('cartItemsList');
        if (cart.length === 0) { c.innerHTML = '<p style="text-align:center;">Cart empty</p>'; return; }
        c.innerHTML = cart.map(item => `
            <div class="cart-item"><div><strong>${item.name}</strong><br>${getSymbol()}${getDisplayPrice(item.price)} x${item.quantity}</div>
            <div><button onclick="updateQty(${item.id}, ${item.quantity-1})">-</button> <span style="margin:0 8px;">${item.quantity}</span> <button onclick="updateQty(${item.id}, ${item.quantity+1})">+</button> <button onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i></button></div></div>
        `).join('');
    }

    function updateQty(id, n) { if (n <= 0) removeFromCart(id); else { const i = cart.find(i => i.id === id); if (i) i.quantity = n; updateCartUI(); } }
    function removeFromCart(id) { cart = cart.filter(i => i.id !== id); updateCartUI(); }
    function toggleCart() { document.getElementById('cartSidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
    function closeCart() { document.getElementById('cartSidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

    // ========== ROBLOX VERIFICATION ==========
    async function fetchRobloxAvatar(username) {
        if (!username) return;
        const img = document.getElementById('robloxAvatarImg');
        const display = document.getElementById('robloxDisplayName');
        img.src = "https://ui-avatars.com/api/?name=Loading&background=f59e0b&color=fff&size=100";
        display.innerHTML = `🔍 Looking up @${username}...`;
        try {
            const res = await fetch(`${MIDDLEMAN_URL}/api/roblox/${encodeURIComponent(username)}`);
            const data = await res.json();
            if (data.success && data.avatarUrl) {
                img.src = data.avatarUrl;
                display.innerHTML = `✅ @${data.username}`;
                window.pendingRobloxData = data;
            } else {
                img.src = "https://ui-avatars.com/api/?name=Not+Found&background=ef4444&color=fff&size=100";
                display.innerHTML = "❌ User not found";
                window.pendingRobloxData = null;
            }
        } catch(e) {
            img.src = "https://ui-avatars.com/api/?name=Error&background=ef4444&color=fff&size=100";
            display.innerHTML = "❌ Connection error";
        }
    }

    function openRobloxVerification() {
        if (!isLoggedIn) { showToast("Login first"); performGoogleLogin(); return; }
        if (cart.length === 0) { showToast("Cart empty"); return; }
        document.getElementById('robloxUsernameInput').value = '';
        document.getElementById('robloxAvatarImg').src = "https://ui-avatars.com/api/?name=Roblox&background=6c5ce7&color=fff&size=100";
        document.getElementById('robloxDisplayName').innerHTML = "Enter your username";
        document.getElementById('robloxModal').classList.add('show');
        closeCart();
        let timer;
        document.getElementById('robloxUsernameInput').oninput = function() {
            clearTimeout(timer);
            timer = setTimeout(() => { if (this.value.trim().length > 2) fetchRobloxAvatar(this.value.trim()); }, 500);
        };
    }

    function closeRobloxModal() { document.getElementById('robloxModal').classList.remove('show'); }

    function confirmRobloxAndCheckout() {
        const username = document.getElementById('robloxUsernameInput').value.trim();
        if (!username) { showToast("Enter Roblox username"); return; }
        if (!window.pendingRobloxData) { showToast("Wait for avatar to load"); return; }
        const userData = window.pendingRobloxData;
        localStorage.setItem('verifiedRoblox', JSON.stringify(userData));
        verifiedRobloxUser = userData;
        document.getElementById('robloxModal').classList.remove('show');
        
        // Prepare order data with all cart items
        const orderData = {
            orderId: 'ECHO-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2, 6),
            items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity, total: i.price * i.quantity })),
            subtotal: cart.reduce((s, i) => s + (i.price * i.quantity), 0),
            robloxUser: userData.username,
            robloxDisplayName: userData.displayName,
            customerEmail: currentUser?.email || '',
            customerName: currentUser?.displayName || '',
            currency: currentCurrency,
            symbol: getSymbol(),
            timestamp: Date.now()
        };
        
        sessionStorage.setItem('echoknives_order', JSON.stringify(orderData));
        const cartParam = encodeURIComponent(JSON.stringify(orderData.items));
        const returnUrl = encodeURIComponent(window.location.origin + window.location.pathname);
        
        // Send cart data to payment site via URL
        window.location.href = `${PAYMENT_URL}?cart=${cartParam}&roblox=${encodeURIComponent(userData.username)}&order_id=${orderData.orderId}&return=${returnUrl}`;
    }

    // ========== AUTH ==========
    window.handleAuthStateChanged = function(user) {
        if (user) {
            isLoggedIn = true;
            currentUser = user;
            document.getElementById('userNameDisplay').innerText = user.displayName || user.email?.split('@')[0];
            document.getElementById('userAvatarDisplay').innerHTML = user.photoURL ? `<img src="${user.photoURL}">` : `<i class="fas fa-user"></i>`;
            showToast(`Welcome ${user.displayName || 'User'}!`);
        } else {
            isLoggedIn = false;
            currentUser = null;
            document.getElementById('userNameDisplay').innerText = 'Guest';
            document.getElementById('userAvatarDisplay').innerHTML = `<i class="fas fa-user"></i>`;
        }
        renderProducts();
    };

    async function performGoogleLogin() {
        if (window.firebaseAuth) {
            try { await window.firebaseSignInWithPopup(window.firebaseAuth, window.firebaseProvider); } 
            catch(e) { showToast("Login failed"); }
        } else { showToast("Loading..."); }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderProducts();
        });
    });

    function createParticles() {
        const c = document.getElementById('particles');
        for (let i = 0; i < 60; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.width = (Math.random() * 6 + 2) + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            p.style.animationDuration = (Math.random() * 15 + 10) + 's';
            c.appendChild(p);
        }
    }
    createParticles();
    showHome();
    renderProducts();

    window.showHome = showHome; window.showShop = showShop; window.addToCart = addToCart; window.updateQty = updateQty;
    window.removeFromCart = removeFromCart; window.toggleCart = toggleCart; window.closeCart = closeCart;
    window.changeCurrency = changeCurrency; window.performGoogleLogin = performGoogleLogin;
    window.openRobloxVerification = openRobloxVerification; window.closeRobloxModal = closeRobloxModal;
    window.confirmRobloxAndCheckout = confirmRobloxAndCheckout;
</script>
