<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Bloxview | Professional Trading Platform</title>
    
    <!-- TradingView Widget Library -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #15151f;
            --border: #252530;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --green: #00ff88;
            --red: #ff4466;
            --blue: #00f3ff;
            --purple: #8b5cf6;
            --yellow: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Navigation */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            background: rgba(10, 10, 15, 0.95);
            border-bottom: 1px solid var(--border);
        }

        .nav-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--blue);
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 243, 255, 0.05));
            padding: 0.5rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .balance-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .balance-value {
            font-weight: 700;
            font-size: 1rem;
            color: var(--green);
        }

        button {
            padding: 0.5rem 1.25rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--blue), var(--purple));
            border: none;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 243, 255, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            border-color: var(--blue);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--green), #00cc66);
            border: none;
            color: var(--bg-primary);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--red), #cc3355);
            border: none;
            color: white;
        }

        .main-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
            min-height: calc(100vh - 73px);
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Trading Layout */
        .trading-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 1.5rem;
        }

        .chart-section {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .chart-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .trading-panel {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 1.5rem;
        }

        .order-type-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: var(--bg-secondary);
            padding: 0.25rem;
            border-radius: 12px;
        }

        .order-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .order-tab.active {
            background: var(--blue);
            color: var(--bg-primary);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .price-input, .quantity-input, select {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem;
            width: 100%;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .total-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--blue);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .item-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .item-card:hover {
            border-color: var(--blue);
            transform: translateY(-2px);
        }

        .item-card.selected {
            border-color: var(--blue);
            background: rgba(0, 243, 255, 0.1);
        }

        .item-name {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .item-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--blue);
        }

        .item-change {
            font-size: 0.875rem;
        }

        .item-change.up { color: var(--green); }
        .item-change.down { color: var(--red); }

        .market-table {
            width: 100%;
            border-collapse: collapse;
        }

        .market-table th,
        .market-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .market-table th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.875rem;
        }

        .order-book {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        .order-book-side {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1rem;
        }

        .order-book-title {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
            font-size: 0.875rem;
        }

        .bid-price { color: var(--green); }
        .ask-price { color: var(--red); }

        .portfolio-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h2, h3 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        .toast {
            background: var(--bg-secondary);
            border-left: 4px solid var(--blue);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 0.5rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 1024px) {
            .trading-layout {
                grid-template-columns: 1fr;
            }
            .nav-links {
                display: none;
            }
            .nav-container {
                flex-direction: column;
            }
            .user-panel {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <div class="logo">BLOXVIEW</div>
            <div class="nav-links">
                <a class="nav-link active" data-page="trade">Trade</a>
                <a class="nav-link" data-page="market">Market</a>
                <a class="nav-link" data-page="portfolio">Portfolio</a>
                <a class="nav-link" data-page="deposit">Deposit</a>
            </div>
            <div class="user-panel">
                <div class="balance-card">
                    <div class="balance-label">Balance</div>
                    <div class="balance-value" id="balanceDisplay">10,000 R$</div>
                </div>
                <div class="balance-card">
                    <div class="balance-label">Portfolio Value</div>
                    <div class="balance-value" id="portfolioValueDisplay">0 R$</div>
                </div>
                <button class="btn-secondary" id="resetBtn">Reset</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <!-- Trade Page -->
        <div id="tradePage" class="page active">
            <div class="trading-layout">
                <!-- Chart Section -->
                <div class="chart-section">
                    <div class="chart-header">
                        <div>
                            <h2 id="selectedItemName">Select an Item</h2>
                            <div id="priceChange" style="font-size: 0.875rem;"></div>
                        </div>
                        <div class="timeframe-selector" style="display: flex; gap: 0.5rem;">
                            <button class="btn-secondary timeframe-btn" data-timeframe="1D">1D</button>
                            <button class="btn-secondary timeframe-btn" data-timeframe="1W">1W</button>
                            <button class="btn-secondary timeframe-btn active" data-timeframe="1M">1M</button>
                            <button class="btn-secondary timeframe-btn" data-timeframe="3M">3M</button>
                        </div>
                    </div>
                    <div id="tradingview-widget" style="height: 500px; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary);">
                        <div style="text-align: center;">
                            <div class="loading-spinner" style="border: 3px solid var(--border); border-top-color: var(--blue); width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem;"></div>
                            <p>Chart Loading...</p>
                        </div>
                    </div>
                </div>

                <!-- Trading Panel -->
                <div class="trading-panel">
                    <div class="order-type-tabs">
                        <div class="order-tab active" data-order-type="buy">Buy</div>
                        <div class="order-tab" data-order-type="sell">Sell</div>
                    </div>
                    
                    <div class="form-group">
                        <label>Select Item</label>
                        <select id="tradeItemSelect">
                            <option value="">-- Choose an item --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Price (R$)</label>
                        <input type="number" id="tradePrice" class="price-input" placeholder="Market price" step="0.01">
                    </div>

                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="tradeQuantity" class="quantity-input" value="1" min="1" step="1">
                    </div>

                    <div class="form-group">
                        <label>Total</label>
                        <div class="total-value" id="tradeTotal">0 R$</div>
                    </div>

                    <button class="btn-primary" id="executeTradeBtn" style="width: 100%; margin-top: 1rem;">
                        Execute Trade
                    </button>
                </div>
            </div>

            <!-- Order Book -->
            <div style="margin-top: 1.5rem;">
                <h3>Order Book</h3>
                <div class="order-book" id="orderBook"></div>
            </div>
        </div>

        <!-- Market Page -->
        <div id="marketPage" class="page">
            <div class="section-header">
                <h2>Market Overview</h2>
                <input type="text" id="marketSearch" placeholder="Search items..." class="price-input" style="max-width: 300px;">
            </div>
            <div class="items-grid" id="marketGrid"></div>
        </div>

        <!-- Portfolio Page -->
        <div id="portfolioPage" class="page">
            <div class="portfolio-summary">
                <div class="stat-card">
                    <div>Total Value</div>
                    <div style="font-size: 1.5rem; font-weight: 700; color: var(--blue);" id="portfolioTotal">0 R$</div>
                </div>
                <div class="stat-card">
                    <div>Total P&L</div>
                    <div style="font-size: 1.5rem; font-weight: 700;" id="portfolioPnl">0 R$</div>
                </div>
                <div class="stat-card">
                    <div>Items Held</div>
                    <div style="font-size: 1.5rem; font-weight: 700;" id="itemsHeld">0</div>
                </div>
            </div>
            
            <h3>Your Inventory</h3>
            <div class="items-grid" id="inventoryGrid"></div>
        </div>

        <!-- Deposit Page -->
        <div id="depositPage" class="page">
            <div class="section-header">
                <h2>Deposit Items</h2>
            </div>
            <div class="trading-panel" style="max-width: 500px;">
                <div class="form-group">
                    <label>Select Game</label>
                    <select id="depositGame">
                        <option value="mm2">Murder Mystery 2</option>
                        <option value="adoptme">Adopt Me</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Item</label>
                    <select id="depositItemSelect"></select>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="depositQuantity" value="1" min="1" step="1">
                </div>
                <div class="form-group">
                    <label>Total Value (R$)</label>
                    <div class="total-value" id="depositTotal">0 R$</div>
                </div>
                <button class="btn-success" id="confirmDepositBtn" style="width: 100%;">Confirm Deposit</button>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Market Data - Complete item list with prices
        const MARKET_ITEMS = {
            mm2: [
                { id: 1, name: "Harvester", value: 2200, change: 12.5, icon: "🔪", rarity: "ancient", demand: "high", volume: 1250 },
                { id: 2, name: "Batwing", value: 140, change: 5.2, icon: "🦇", rarity: "godly", demand: "medium", volume: 890 },
                { id: 3, name: "Corrupt", value: 1250, change: 8.3, icon: "🗡️", rarity: "ancient", demand: "high", volume: 2340 },
                { id: 4, name: "Luger", value: 165, change: -2.1, icon: "🔫", rarity: "godly", demand: "medium", volume: 560 },
                { id: 5, name: "Chroma Darkbringer", value: 1850, change: 15.3, icon: "⚫", rarity: "chroma", demand: "high", volume: 890 },
                { id: 6, name: "Elderwood Scythe", value: 450, change: 3.2, icon: "🌿", rarity: "godly", demand: "medium", volume: 445 },
                { id: 7, name: "Chroma Lightbringer", value: 1780, change: 10.2, icon: "⚪", rarity: "chroma", demand: "high", volume: 670 },
                { id: 8, name: "Icebreaker", value: 320, change: -1.5, icon: "❄️", rarity: "godly", demand: "low", volume: 234 }
            ],
            adoptme: [
                { id: 101, name: "Shadow Dragon", value: 1250, change: 15.2, icon: "🐉", rarity: "legendary", demand: "high", volume: 320 },
                { id: 102, name: "Frost Dragon", value: 980, change: 8.3, icon: "❄️", rarity: "legendary", demand: "high", volume: 280 },
                { id: 103, name: "Giraffe", value: 850, change: 5.2, icon: "🦒", rarity: "legendary", demand: "medium", volume: 150 },
                { id: 104, name: "Bat Dragon", value: 1100, change: 10.5, icon: "🦇", rarity: "legendary", demand: "high", volume: 410 },
                { id: 105, name: "Owl", value: 720, change: 4.8, icon: "🦉", rarity: "legendary", demand: "medium", volume: 230 },
                { id: 106, name: "Parrot", value: 680, change: 3.2, icon: "🦜", rarity: "legendary", demand: "medium", volume: 190 },
                { id: 107, name: "Evil Unicorn", value: 550, change: -2.1, icon: "🦄", rarity: "legendary", demand: "low", volume: 145 },
                { id: 108, name: "Crow", value: 490, change: 1.5, icon: "🐦‍⬛", rarity: "legendary", demand: "medium", volume: 178 }
            ]
        };

        // Flatten items for easy access
        const ALL_ITEMS = [...MARKET_ITEMS.mm2, ...MARKET_ITEMS.adoptme];

        // App State
        let userBalance = 10000;
        let inventory = [];
        let selectedOrderType = 'buy';
        let currentSelectedItem = null;
        let priceChart = null;

        // Load saved data
        function loadData() {
            const savedBalance = localStorage.getItem('bloxview_balance');
            if (savedBalance) userBalance = parseFloat(savedBalance);
            
            const savedInventory = localStorage.getItem('bloxview_inventory');
            if (savedInventory) {
                inventory = JSON.parse(savedInventory);
            }
            
            updateBalanceDisplay();
        }

        // Save data
        function saveData() {
            localStorage.setItem('bloxview_balance', userBalance);
            localStorage.setItem('bloxview_inventory', JSON.stringify(inventory));
        }

        // Reset to default
        function resetData() {
            userBalance = 10000;
            inventory = [];
            saveData();
            updateBalanceDisplay();
            renderInventory();
            renderMarket();
            updatePortfolioStats();
            showToast('Account reset to default!', 'success');
        }

        // Update balance display
        function updateBalanceDisplay() {
            document.getElementById('balanceDisplay').textContent = `${userBalance.toLocaleString()} R$`;
        }

        // Calculate portfolio total value
        function calculatePortfolioValue() {
            return inventory.reduce((total, item) => {
                const marketItem = ALL_ITEMS.find(i => i.id === item.id);
                return total + (marketItem ? marketItem.value * item.quantity : 0);
            }, 0);
        }

        // Update portfolio stats
        function updatePortfolioStats() {
            const portfolioValue = calculatePortfolioValue();
            const totalValue = userBalance + portfolioValue;
            const itemsCount = inventory.reduce((sum, item) => sum + item.quantity, 0);
            
            document.getElementById('portfolioValueDisplay').textContent = `${portfolioValue.toLocaleString()} R$`;
            document.getElementById('portfolioTotal').textContent = `${totalValue.toLocaleString()} R$`;
            document.getElementById('itemsHeld').textContent = itemsCount;
            
            const initialCapital = 10000;
            const pnl = totalValue - initialCapital;
            const pnlPercent = (pnl / initialCapital) * 100;
            const pnlElement = document.getElementById('portfolioPnl');
            pnlElement.textContent = `${pnl >= 0 ? '+' : ''}${pnl.toLocaleString()} R$ (${pnlPercent >= 0 ? '+' : ''}${pnlPercent.toFixed(1)}%)`;
            pnlElement.style.color = pnl >= 0 ? 'var(--green)' : 'var(--red)';
        }

        // Execute trade
        function executeTrade() {
            const itemId = parseInt(document.getElementById('tradeItemSelect').value);
            const price = parseFloat(document.getElementById('tradePrice').value);
            const quantity = parseInt(document.getElementById('tradeQuantity').value);
            
            if (!itemId || isNaN(price) || price <= 0 || isNaN(quantity) || quantity <= 0) {
                showToast('Please fill in all fields correctly', 'error');
                return;
            }
            
            const item = ALL_ITEMS.find(i => i.id === itemId);
            if (!item) {
                showToast('Item not found', 'error');
                return;
            }
            
            const totalCost = price * quantity;
            
            if (selectedOrderType === 'buy') {
                if (userBalance < totalCost) {
                    showToast(`Insufficient balance! Need ${totalCost.toLocaleString()} R$`, 'error');
                    return;
                }
                
                // Add to inventory
                const existingItem = inventory.find(i => i.id === item.id);
                if (existingItem) {
                    existingItem.quantity += quantity;
                    existingItem.averagePrice = ((existingItem.averagePrice * (existingItem.quantity - quantity)) + (price * quantity)) / existingItem.quantity;
                } else {
                    inventory.push({
                        id: item.id,
                        name: item.name,
                        icon: item.icon,
                        quantity: quantity,
                        averagePrice: price,
                        game: item.game || (item.id < 100 ? 'mm2' : 'adoptme')
                    });
                }
                
                userBalance -= totalCost;
                showToast(`Bought ${quantity}x ${item.name} for ${totalCost.toLocaleString()} R$!`, 'success');
            } else {
                // Sell
                const existingItem = inventory.find(i => i.id === item.id);
                if (!existingItem || existingItem.quantity < quantity) {
                    showToast(`Not enough ${item.name} to sell!`, 'error');
                    return;
                }
                
                existingItem.quantity -= quantity;
                if (existingItem.quantity === 0) {
                    const index = inventory.indexOf(existingItem);
                    inventory.splice(index, 1);
                }
                
                userBalance += totalCost;
                showToast(`Sold ${quantity}x ${item.name} for ${totalCost.toLocaleString()} R$!`, 'success');
            }
            
            saveData();
            updateBalanceDisplay();
            renderInventory();
            renderMarket();
            updatePortfolioStats();
            updateTradeTotal();
            updateOrderBook();
        }

        // Update trade total calculation
        function updateTradeTotal() {
            const price = parseFloat(document.getElementById('tradePrice').value) || 0;
            const quantity = parseInt(document.getElementById('tradeQuantity').value) || 0;
            const total = price * quantity;
            document.getElementById('tradeTotal').textContent = `${total.toLocaleString()} R$`;
        }

        // Update deposit total
        function updateDepositTotal() {
            const select = document.getElementById('depositItemSelect');
            const selectedOption = select.options[select.selectedIndex];
            const value = parseFloat(selectedOption?.dataset?.value || 0);
            const quantity = parseInt(document.getElementById('depositQuantity').value) || 0;
            const total = value * quantity;
            document.getElementById('depositTotal').textContent = `${total.toLocaleString()} R$`;
        }

        // Confirm deposit
        function confirmDeposit() {
            const game = document.getElementById('depositGame').value;
            const itemId = parseInt(document.getElementById('depositItemSelect').value);
            const quantity = parseInt(document.getElementById('depositQuantity').value);
            
            const items = game === 'mm2' ? MARKET_ITEMS.mm2 : MARKET_ITEMS.adoptme;
            const item = items.find(i => i.id === itemId);
            
            if (!item || quantity <= 0 || quantity > 100) {
                showToast('Invalid deposit', 'error');
                return;
            }
            
            const totalValue = item.value * quantity;
            
            // Add to inventory
            const existingItem = inventory.find(i => i.id === item.id);
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                inventory.push({
                    id: item.id,
                    name: item.name,
                    icon: item.icon,
                    quantity: quantity,
                    averagePrice: item.value,
                    game: game
                });
            }
            
            saveData();
            renderInventory();
            renderMarket();
            updatePortfolioStats();
            updateOrderBook();
            showToast(`Deposited ${quantity}x ${item.name} worth ${totalValue.toLocaleString()} R$!`, 'success');
        }

        // Render market grid
        function renderMarket() {
            const searchTerm = document.getElementById('marketSearch')?.value.toLowerCase() || '';
            const filtered = ALL_ITEMS.filter(item => 
                item.name.toLowerCase().includes(searchTerm)
            );
            
            const grid = document.getElementById('marketGrid');
            grid.innerHTML = filtered.map(item => `
                <div class="item-card" onclick="selectMarketItem(${item.id})">
                    <div class="item-name">${item.icon} ${item.name}</div>
                    <div class="item-price">${item.value.toLocaleString()} R$</div>
                    <div class="item-change ${item.change >= 0 ? 'up' : 'down'}">
                        ${item.change >= 0 ? '+' : ''}${item.change}%
                    </div>
                    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.5rem;">
                        Vol: ${item.volume.toLocaleString()}
                    </div>
                </div>
            `).join('');
        }

        // Select item from market
        function selectMarketItem(itemId) {
            const item = ALL_ITEMS.find(i => i.id === itemId);
            if (item) {
                document.getElementById('tradeItemSelect').value = itemId;
                document.getElementById('tradePrice').value = item.value;
                updateTradeTotal();
                showToast(`${item.name} selected`, 'info');
            }
        }

        // Render inventory
        function renderInventory() {
            const grid = document.getElementById('inventoryGrid');
            if (!inventory.length) {
                grid.innerHTML = '<div class="empty-state" style="text-align: center; padding: 3rem;">No items in inventory. Go to Market or Deposit to add items!</div>';
                return;
            }
            
            grid.innerHTML = inventory.map(item => {
                const marketItem = ALL_ITEMS.find(i => i.id === item.id);
                const currentValue = marketItem ? marketItem.value : item.averagePrice;
                const totalValue = currentValue * item.quantity;
                const pnl = (currentValue - item.averagePrice) * item.quantity;
                
                return `
                    <div class="item-card">
                        <div class="item-name">${item.icon} ${item.name}</div>
                        <div>Quantity: ${item.quantity}</div>
                        <div>Avg Price: ${item.averagePrice.toLocaleString()} R$</div>
                        <div>Current: ${currentValue.toLocaleString()} R$</div>
                        <div>Total: ${totalValue.toLocaleString()} R$</div>
                        <div style="color: ${pnl >= 0 ? 'var(--green)' : 'var(--red)'}">
                            P&L: ${pnl >= 0 ? '+' : ''}${pnl.toLocaleString()} R$
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update order book (mock data)
        function updateOrderBook() {
            const selectedItemId = parseInt(document.getElementById('tradeItemSelect').value);
            const item = ALL_ITEMS.find(i => i.id === selectedItemId);
            
            if (!item) {
                document.getElementById('orderBook').innerHTML = '<div style="text-align: center; padding: 2rem;">Select an item to view order book</div>';
                return;
            }
            
            const basePrice = item.value;
            const bids = [];
            const asks = [];
            
            for (let i = 1; i <= 5; i++) {
                bids.push({ price: basePrice - (i * 5), quantity: Math.floor(Math.random() * 50) + 10 });
                asks.push({ price: basePrice + (i * 5), quantity: Math.floor(Math.random() * 50) + 10 });
            }
            
            document.getElementById('orderBook').innerHTML = `
                <div class="order-book-side">
                    <div class="order-book-title">Bids (Buy Orders)</div>
                    ${bids.map(bid => `
                        <div class="order-row">
                            <span class="bid-price">${bid.price.toLocaleString()} R$</span>
                            <span>${bid.quantity} items</span>
                        </div>
                    `).join('')}
                </div>
                <div class="order-book-side">
                    <div class="order-book-title">Asks (Sell Orders)</div>
                    ${asks.map(ask => `
                        <div class="order-row">
                            <span class="ask-price">${ask.price.toLocaleString()} R$</span>
                            <span>${ask.quantity} items</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Initialize chart
        function initChart() {
            const widgetContainer = document.getElementById('tradingview-widget');
            
            if (typeof TradingView !== 'undefined') {
                widgetContainer.innerHTML = '';
                new TradingView.widget({
                    container_id: "tradingview-widget",
                    symbol: "BINANCE:BTCUSDT",
                    interval: "60",
                    timezone: "Etc/UTC",
                    theme: "dark",
                    style: "1",
                    locale: "en",
                    toolbar_bg: "#131722",
                    enable_publishing: false,
                    hide_top_toolbar: true,
                    allow_symbol_change: false,
                    studies: ["MASimple@tv-basicstudies", "RSI@tv-basicstudies"],
                    width: "100%",
                    height: "100%"
                });
            } else {
                widgetContainer.innerHTML = '<div style="text-align: center; padding: 3rem;">Chart widget failed to load. Using fallback chart.</div>';
            }
        }

        // Initialize dropdowns
        function initDropdowns() {
            const tradeSelect = document.getElementById('tradeItemSelect');
            const depositSelect = document.getElementById('depositItemSelect');
            
            tradeSelect.innerHTML = '<option value="">-- Choose an item --</option>' + 
                ALL_ITEMS.map(item => `<option value="${item.id}">${item.icon} ${item.name} - ${item.value} R$</option>`).join('');
            
            function updateDepositItems() {
                const game = document.getElementById('depositGame').value;
                const items = game === 'mm2' ? MARKET_ITEMS.mm2 : MARKET_ITEMS.adoptme;
                depositSelect.innerHTML = items.map(item => 
                    `<option value="${item.id}" data-value="${item.value}">${item.icon} ${item.name} - ${item.value} R$</option>`
                ).join('');
                updateDepositTotal();
            }
            
            document.getElementById('depositGame').addEventListener('change', updateDepositItems);
            updateDepositItems();
            
            tradeSelect.addEventListener('change', (e) => {
                const item = ALL_ITEMS.find(i => i.id === parseInt(e.target.value));
                if (item) {
                    document.getElementById('tradePrice').value = item.value;
                    updateTradeTotal();
                    updateOrderBook();
                }
            });
        }

        // Navigation
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(`${pageId}Page`).classList.add('active');
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.dataset.page === pageId) link.classList.add('active');
            });
            
            if (pageId === 'portfolio') {
                renderInventory();
                updatePortfolioStats();
            }
            if (pageId === 'market') renderMarket();
            if (pageId === 'deposit') updateDepositTotal();
        }

        // Show toast notification
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Event listeners
        function setupEventListeners() {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', () => switchPage(link.dataset.page));
            });
            
            document.querySelectorAll('.order-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.order-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    selectedOrderType = tab.dataset.orderType;
                });
            });
            
            document.getElementById('executeTradeBtn').addEventListener('click', executeTrade);
            document.getElementById('resetBtn').addEventListener('click', resetData);
            document.getElementById('confirmDepositBtn').addEventListener('click', confirmDeposit);
            document.getElementById('tradePrice').addEventListener('input', updateTradeTotal);
            document.getElementById('tradeQuantity').addEventListener('input', updateTradeTotal);
            document.getElementById('depositQuantity').addEventListener('input', updateDepositTotal);
            document.getElementById('marketSearch').addEventListener('input', renderMarket);
            
            // Timeframe buttons
            document.querySelectorAll('.timeframe-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showToast(`Changed to ${btn.dataset.timeframe} view`, 'info');
                });
            });
        }

        // Initialize app
        function init() {
            loadData();
            initDropdowns();
            setupEventListeners();
            renderMarket();
            renderInventory();
            updatePortfolioStats();
            updateOrderBook();
            initChart();
            showToast('Welcome to Bloxview Professional Trading Platform!', 'success');
        }
        
        // Make selectMarketItem globally accessible
        window.selectMarketItem = selectMarketItem;
        
        // Start app
        init();
    </script>
</body>
</html>
