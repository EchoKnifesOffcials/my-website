<body>

<!-- ===== YOUR FULL UI STAYS EXACT SAME (REMOVED HERE FOR BREVITY) ===== -->
<!-- DO NOT WORRY: NOTHING WAS CHANGED ABOVE -->

<!-- ROBLOX MODAL (UNCHANGED UI) -->
<div class="roblox-modal" id="robloxModal">
    <div class="roblox-content">
        <h2>Verify Roblox Account</h2>

        <div class="roblox-avatar">
            <img id="robloxAvatarImg"
            src="https://ui-avatars.com/api/?name=Roblox&background=6c5ce7&color=fff&size=120">
        </div>

        <div id="robloxDisplayName" class="roblox-username-display">
            Enter your username
        </div>

        <input type="text" id="robloxUsernameInput" class="roblox-input"
        placeholder="Roblox Username">

        <div style="display:flex;gap:10px;margin-top:20px;">
            <button class="btn-blue" onclick="confirmRobloxAndCheckout()">Yes</button>
            <button class="btn-red" onclick="resetRobloxUsername()">No</button>
        </div>
    </div>
</div>

<script>
/* =========================
   🔥 VERIFIED SYSTEM ONLY
   ========================= */

let pendingRobloxUsername = "";

/* ✅ UPDATED VERIFICATION (REPLACEMENT) */
async function fetchRobloxAvatar(username) {
    if (!username) return;

    const img = document.getElementById("robloxAvatarImg");
    const text = document.getElementById("robloxDisplayName");

    img.src = "https://ui-avatars.com/api/?name=Loading&background=6c5ce7&color=fff&size=120";
    text.innerHTML = "Checking @" + username + "...";

    try {
        const res = await fetch("https://users.roblox.com/v1/usernames/users", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                usernames:[username],
                excludeBannedUsers:true
            })
        });

        const data = await res.json();

        if (!data.data || data.data.length === 0) {
            img.src = "https://ui-avatars.com/api/?name=Not+Found&background=ef4444&color=fff";
            text.innerHTML = "User not found ❌";
            window.robloxVerifiedUser = null;
            return;
        }

        const user = data.data[0];

        const avatarRes = await fetch(
            `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${user.id}&size=150x150&format=Png&isCircular=true`
        );

        const avatarData = await avatarRes.json();
        const image = avatarData.data?.[0]?.imageUrl;

        img.src = image || "https://ui-avatars.com/api/?name=" + username;

        text.innerHTML = "✔ @" + user.name + "<br><span style='font-size:12px;color:#aaa;'>"
            + user.displayName + "</span>";

        window.robloxVerifiedUser = {
            userId: user.id,
            username: user.name,
            displayName: user.displayName
        };

    } catch (e) {
        console.log(e);
        img.src = "https://ui-avatars.com/api/?name=Error&background=ef4444&color=fff";
        text.innerHTML = "Error loading user ❌";
        window.robloxVerifiedUser = null;
    }
}

/* LIVE INPUT */
document.addEventListener("input", (e) => {
    if (e.target.id === "robloxUsernameInput") {
        const val = e.target.value.trim();
        if (val) {
            fetchRobloxAvatar(val);
            pendingRobloxUsername = val;
        }
    }
});

/* RESET */
function resetRobloxUsername() {
    document.getElementById("robloxUsernameInput").value = "";
    document.getElementById("robloxAvatarImg").src =
        "https://ui-avatars.com/api/?name=Roblox&background=6c5ce7&color=fff&size=120";
    document.getElementById("robloxDisplayName").innerHTML = "Enter username";
    window.robloxVerifiedUser = null;
}

/* 🔒 UPDATED CHECKOUT PROTECTION */
function confirmRobloxAndCheckout() {
    const username = document.getElementById("robloxUsernameInput").value.trim();

    if (!window.robloxVerifiedUser ||
        window.robloxVerifiedUser.username !== username) {
        alert("Please verify a valid Roblox account first");
        return;
    }

    localStorage.setItem("roblox_username", username);

    document.getElementById("robloxModal").classList.remove("show");

    alert("Verified checkout for @" + username);
}
</script>
