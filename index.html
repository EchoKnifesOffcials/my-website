<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ECHOKNIVES | MM2 Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.paypal.com/sdk/js?client-id=AUXq7gkV7XJ3h3V1xH5yL2pK9nR4mQ8wE6tY1uI3oP0sD9fG6hJ4kL2zX7cV8bN3m&currency=PHP"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0a0f 0%, #050508 100%);
            color: #f1f5f9;
            overflow-x: hidden;
        }

        /* animated bg elements */
        .vfx-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle-field {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 50%;
            animation: floatParticle 20s infinite linear;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.6; }
            100% { transform: translateY(-100vh) translateX(80px); opacity: 0; }
        }
        .glow-trail {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #6366f1, #a855f7, transparent);
            top: 25%;
            animation: slideGlow 14s infinite;
            opacity: 0.3;
        }
        @keyframes slideGlow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* header */
        .header {
            background: rgba(8, 8, 14, 0.75);
            backdrop-filter: blur(16px);
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid rgba(99, 102, 241, 0.25);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .logo-icon {
            font-size: 32px;
            color: #6366f1;
            filter: drop-shadow(0 0 8px #6366f1);
        }
        .logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 6px;
            background: #14141e;
            padding: 5px;
            border-radius: 60px;
        }
        .nav-link {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            background: transparent;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-link.active {
            background: #6366f1;
            color: white;
            box-shadow: 0 2px 12px rgba(99,102,241,0.4);
        }
        .top-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .currency-selector {
            background: #14141e;
            border-radius: 40px;
            padding: 8px 14px;
            border: 1px solid #2a2a36;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #14141e;
            padding: 5px 14px;
            border-radius: 40px;
        }
        .avatar {
            width: 32px;
            height: 32px;
            background: #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-icon {
            position: relative;
            cursor: pointer;
            background: #14141e;
            padding: 8px 16px;
            border-radius: 40px;
        }
        .cart-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            border-radius: 30px;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* search + categories */
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        .search-box {
            background: #14141e;
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #2a2a36;
            width: 280px;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
        }
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 32px;
            border-bottom: 1px solid #252530;
            padding-bottom: 12px;
        }
        .category-btn {
            background: transparent;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            color: #cbd5e1;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .category-btn.active {
            background: #6366f1;
            color: white;
        }

        /* product grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 28px;
        }
        .product-card {
            background: #111117;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #262633;
            transition: 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
            box-shadow: 0 15px 30px -12px rgba(99,102,241,0.2);
        }
        .product-img {
            background: #08080e;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .product-img img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            transition: 0.2s;
        }
        .product-card:hover .product-img img {
            transform: scale(1.02);
        }
        .product-info {
            padding: 18px;
        }
        .product-name {
            font-size: 18px;
            font-weight: 700;
        }
        .product-price {
            font-size: 26px;
            font-weight: 800;
            color: #6366f1;
            margin: 8px 0;
        }
        .add-to-cart {
            width: 100%;
            padding: 10px;
            background: #6366f1;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        /* cart sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -450px;
            width: 400px;
            height: 100vh;
            background: #0d0d13;
            z-index: 200;
            transition: 0.25s;
            padding: 24px;
            border-left: 2px solid #6366f1;
        }
        .cart-sidebar.open {
            right: 0;
        }
        .cart-total {
            font-size: 22px;
            font-weight: 800;
            margin: 20px 0;
        }
        .checkout-btn {
            width: 100%;
            padding: 14px;
            background: #10b981;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 150;
            display: none;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 300;
            transform: translateX(400px);
            transition: 0.2s;
        }
        .toast.show {
            transform: translateX(0);
        }
        @media (max-width: 700px) {
            .cart-sidebar { width: 100%; right: -100%; }
            .category-tabs { overflow-x: auto; flex-wrap: nowrap; }
        }
    </style>
</head>
<body>

<div class="vfx-layer">
    <div class="particle-field" id="particles"></div>
    <div class="glow-trail"></div>
</div>

<div class="header">
    <div class="logo" onclick="showHome()">
        <i class="fas fa-gem logo-icon"></i>
        <div class="logo-text">ECHOKNIVES</div>
    </div>
    <div class="nav-links">
        <button class="nav-link active" onclick="showShop()">🛒 Shop</button>
        <button class="nav-link" onclick="showTrading()">🤝 Trading</button>
    </div>
    <div class="top-actions">
        <div class="currency-selector">
            <i class="fas fa-globe"></i>
            <select id="currencySelect" onchange="changeCurrency()">
                <option value="PHP">🇵🇭 PHP</option>
                <option value="USD">🇺🇸 USD</option>
                <option value="EUR">🇪🇺 EUR</option>
                <option value="GBP">🇬🇧 GBP</option>
            </select>
        </div>
        <div class="user-info" id="userInfo">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <span>Guest</span>
            <button class="login-header-btn" onclick="triggerLogin()" style="background:#6366f1; border:none; padding:6px 14px; border-radius:30px; color:white;">Login</button>
        </div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </div>
</div>

<!-- SHOP SECTION -->
<div id="shopSection" style="padding: 40px 5%;">
    <div class="shop-header">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search items..." onkeyup="filterItems()">
        </div>
    </div>
    <div class="category-tabs" id="categoryTabs">
        <button class="category-btn active" data-cat="all">All</button>
        <button class="category-btn" data-cat="knife">🔪 Knives</button>
        <button class="category-btn" data-cat="gun">🔫 Guns</button>
        <button class="category-btn" data-cat="chroma">🌈 Chromas</button>
        <button class="category-btn" data-cat="godly">👑 Godly</button>
        <button class="category-btn" data-cat="ancient">🏺 Ancient</button>
        <button class="category-btn" data-cat="classic">✨ Classic</button>
    </div>
    <div class="products-grid" id="productsGrid"></div>
</div>

<div id="tradingSection" style="display:none; padding:60px 5%; text-align:center;">
    <h2>🤝 Trading Hub</h2>
    <p>Post offers, trade items — coming soon.</p>
</div>

<!-- cart sidebar -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
    <div style="display:flex; justify-content:space-between; margin-bottom:24px;"><h3>Your cart</h3><button onclick="closeCart()" style="background:none; border:none; font-size:24px; color:white;">✖</button></div>
    <div id="cartItemsList" style="flex:1; overflow-y:auto;"></div>
    <div class="cart-total" id="cartTotal">Total: ₱0</div>
    <input type="text" id="robloxUser" placeholder="Roblox username" style="width:100%; padding:12px; background:#1e1e2a; border-radius:60px; border:none; margin:12px 0;">
    <button class="checkout-btn" onclick="checkout()">Place order</button>
</div>

<div class="toast" id="toastMsg"></div>

<script>
    // ------------------------------
    // 1. ITEMS (full dataset with images)
    // ------------------------------
    const items = [
        // knives
        { id: 1, name: "Icewing", category: "knife", rarity: "Godly", price: 72, image: "https://i.imgur.com/jiwvmxq.jpeg" },
        { id: 2, name: "Hallows Blade", category: "knife", rarity: "Godly", price: 78, image: "https://i.imgur.com/2fGtH7k.png" },
        { id: 3, name: "Fang", category: "knife", rarity: "Godly", price: 228, image: "https://i.imgur.com/5hJkL9o.png" },
        { id: 4, name: "Slasher", category: "knife", rarity: "Godly", price: 266, image: "https://i.imgur.com/7uKvH2l.png" },
        { id: 5, name: "Heat", category: "knife", rarity: "Godly", price: 323, image: "https://i.imgur.com/9mNpR2q.png" },
        { id: 6, name: "Nightblade", category: "knife", rarity: "Godly", price: 67, image: "https://i.imgur.com/4sJtL5p.png" },
        { id: 7, name: "Deathshard", category: "knife", rarity: "Godly", price: 73, image: "https://i.imgur.com/1wEfR4t.png" },
        { id: 8, name: "Saw", category: "knife", rarity: "Godly", price: 76, image: "https://i.imgur.com/6cDvB3m.png" },
        // guns
        { id: 9, name: "Luger", category: "gun", rarity: "Godly", price: 207, image: "https://i.imgur.com/eEvMBRh.jpeg" },
        { id: 10, name: "Shark", category: "gun", rarity: "Godly", price: 56, image: "https://i.imgur.com/5dFgH7n.png" },
        { id: 11, name: "Laser", category: "gun", rarity: "Godly", price: 104, image: "https://i.imgur.com/2aBcX4p.png" },
        { id: 12, name: "Blaster", category: "gun", rarity: "Godly", price: 285, image: "https://i.imgur.com/9mNpR2q.png" },
        { id: 13, name: "Darkbringer", category: "gun", rarity: "Godly", price: 92000, image: "https://i.imgur.com/8oxgzwa.jpeg" },
        { id: 14, name: "Lightbringer", category: "gun", rarity: "Godly", price: 92000, image: "https://i.imgur.com/BUljuYV.jpeg" },
        // chromas
        { id: 15, name: "Chroma Fang", category: "chroma", rarity: "Chroma", price: 1140, image: "https://i.imgur.com/9mNpR2q.png" },
        { id: 16, name: "Chroma Slasher", category: "chroma", rarity: "Chroma", price: 1180, image: "https://i.imgur.com/2aBcX4p.png" },
        { id: 17, name: "Chroma Heat", category: "chroma", rarity: "Chroma", price: 1235, image: "https://i.imgur.com/5dFgH7n.png" },
        { id: 18, name: "Chroma Luger", category: "chroma", rarity: "Chroma", price: 1425, image: "https://i.imgur.com/eEvMBRh.jpeg" },
        // ancients
        { id: 19, name: "Harvester", category: "ancient", rarity: "Ancient", price: 608, image: "https://i.imgur.com/jZkbQ4t.jpeg" },
        { id: 20, name: "Icebreaker", category: "ancient", rarity: "Ancient", price: 712, image: "https://i.imgur.com/6cDvB3m.png" },
        { id: 21, name: "Elderwood Scythe", category: "ancient", rarity: "Ancient", price: 655, image: "https://i.imgur.com/1wEfR4t.png" },
        // classic / godly
        { id: 22, name: "Virtual", category: "godly", rarity: "Godly", price: 261, image: "https://i.imgur.com/8QZ7VcL.png" },
        { id: 23, name: "Amerilaser", category: "godly", rarity: "Godly", price: 309, image: "https://i.imgur.com/5hJkL9o.png" },
        { id: 24, name: "Old Glory", category: "godly", rarity: "Godly", price: 304, image: "https://i.imgur.com/1wEfR4t.png" },
        { id: 25, name: "Red Luger", category: "godly", rarity: "Godly", price: 342, image: "https://i.imgur.com/6cDvB3m.png" },
        // pets / classic
        { id: 26, name: "Electro", category: "classic", rarity: "Rare", price: 95, image: "https://i.imgur.com/8bRcV2k.png" },
        { id: 27, name: "Phoenix", category: "classic", rarity: "Rare", price: 114, image: "https://i.imgur.com/4sJtL5p.png" },
        { id: 28, name: "Fire Dog", category: "classic", rarity: "Rare", price: 171, image: "https://i.imgur.com/5dFgH7n.png" }
    ];

    // helpers
    let cart = [];
    let currentCurrency = "PHP";
    let currentCategory = "all";
    let searchQuery = "";

    const symbols = { PHP: "₱", USD: "$", EUR: "€", GBP: "£" };
    const exchange = { PHP: 1, USD: 0.017, EUR: 0.016, GBP: 0.013 };

    function convertPrice(phpPrice) {
        return (phpPrice * exchange[currentCurrency]).toFixed(2);
    }
    function getSymbol() { return symbols[currentCurrency]; }

    function renderProducts() {
        let filtered = items.filter(item => {
            const matchCategory = currentCategory === "all" ? true : item.category === currentCategory;
            const matchSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase());
            return matchCategory && matchSearch;
        });
        const container = document.getElementById("productsGrid");
        if (!container) return;
        container.innerHTML = filtered.map(item => `
            <div class="product-card">
                <div class="product-img">
                    <img src="${item.image}" onerror="this.src='https://placehold.co/200x200/6366f1/white?text=MM2'" alt="${item.name}">
                </div>
                <div class="product-info">
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">${getSymbol()}${convertPrice(item.price)}</div>
                    <button class="add-to-cart" onclick="addToCart(${item.id})">Add to cart</button>
                </div>
            </div>
        `).join("");
    }

    function addToCart(id) {
        const item = items.find(i => i.id === id);
        if (!item) return;
        const existing = cart.find(i => i.id === id);
        if (existing) existing.qty++;
        else cart.push({ ...item, qty: 1 });
        updateCartUI();
        showToast(`${item.name} added`);
    }

    function updateCartUI() {
        const container = document.getElementById("cartItemsList");
        const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
        const itemCount = cart.reduce((sum, i) => sum + i.qty, 0);
        document.getElementById("cartCount").innerText = itemCount;
        document.getElementById("cartTotal").innerHTML = `Total: ${getSymbol()}${convertPrice(total)}`;
        if (!cart.length) {
            container.innerHTML = "<p style='text-align:center; margin-top:20px'>Cart empty</p>";
            return;
        }
        container.innerHTML = cart.map(item => `
            <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                <div><strong>${item.name}</strong><br>${getSymbol()}${convertPrice(item.price)} x${item.qty}</div>
                <div><button onclick="removeItem(${item.id})" style="background:#ef4444; border:none; border-radius:30px; padding:4px 12px;">✖</button></div>
            </div>
        `).join("");
    }

    function removeItem(id) {
        cart = cart.filter(i => i.id !== id);
        updateCartUI();
    }

    function checkout() {
        const robloxUser = document.getElementById("robloxUser").value.trim();
        if (!robloxUser) { showToast("Enter Roblox username"); return; }
        if (cart.length === 0) { showToast("Cart empty"); return; }
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        showToast(`Order placed! Total: ${getSymbol()}${convertPrice(total)}`);
        cart = [];
        updateCartUI();
        closeCart();
    }

    // ui helpers
    function toggleCart() {
        document.getElementById("cartSidebar").classList.add("open");
        document.getElementById("overlay").style.display = "block";
    }
    function closeCart() {
        document.getElementById("cartSidebar").classList.remove("open");
        document.getElementById("overlay").style.display = "none";
    }
    function showToast(msg) {
        const t = document.getElementById("toastMsg");
        t.innerText = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2500);
    }
    function changeCurrency() {
        currentCurrency = document.getElementById("currencySelect").value;
        renderProducts();
        updateCartUI();
    }
    function filterItems() {
        searchQuery = document.getElementById("searchInput").value;
        renderProducts();
    }

    // category switching
    function initCategories() {
        document.querySelectorAll(".category-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentCategory = btn.dataset.cat;
                renderProducts();
            });
        });
    }

    // navigation
    function showShop() {
        document.getElementById("shopSection").style.display = "block";
        document.getElementById("tradingSection").style.display = "none";
        document.querySelectorAll(".nav-link").forEach(l => l.classList.remove("active"));
        document.querySelector(".nav-link:first-child").classList.add("active");
        renderProducts();
    }
    function showTrading() {
        document.getElementById("shopSection").style.display = "none";
        document.getElementById("tradingSection").style.display = "block";
        document.querySelectorAll(".nav-link").forEach(l => l.classList.remove("active"));
        document.querySelector(".nav-link:last-child").classList.add("active");
    }
    function showHome() { showShop(); }
    function triggerLogin() { alert("🔐 Firebase login would open — but shop works as guest. Admin can enable Google auth."); }

    // particles
    for (let i = 0; i < 80; i++) {
        let p = document.createElement("div");
        p.className = "particle";
        p.style.width = (Math.random() * 6 + 2) + "px";
        p.style.height = p.style.width;
        p.style.left = Math.random() * 100 + "%";
        p.style.animationDelay = Math.random() * 20 + "s";
        p.style.animationDuration = (Math.random() * 15 + 8) + "s";
        document.getElementById("particles").appendChild(p);
    }

    // start
    initCategories();
    renderProducts();
    updateCartUI();
    showShop();
</script>
</body>
</html>
