    for (let i = 42; i <= 169; i++) {
        items.push({
            id: i,
            name: `MM2 Item #${i}`,
            category: ["knife", "gun", "pet", "chroma", "ancient"][i % 5],
            price: Math.floor(Math.random() * 500) + 50,
            image: "https://i.imgur.com/8QZ7VcL.png"

    let isLoggedIn = false;
    let currentUser = null;
    let currentCategory = "all";
    let currentPriceFilter = "all";
    let searchQuery = "";
    let currentSort = "default";
    let currentPage = 1;
    const itemsPerPage = 20;

    function showToast(msg) {
        const t = document.getElementById("toastMsg");
        t.innerText = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2500);
    }

    function showTrading() { showToast("Trading hub coming soon!"); }
    function showChat() { showToast("Messages coming soon!"); }

    function getFilteredItems() {
        let filtered = [...items];
        
        // Category filter
        if (currentCategory !== "all") {
            filtered = filtered.filter(item => item.category === currentCategory);
        }
        
        // Price filter
        if (currentPriceFilter !== "all") {
            if (currentPriceFilter === "0-100") filtered = filtered.filter(item => item.price < 100);
            else if (currentPriceFilter === "100-500") filtered = filtered.filter(item => item.price >= 100 && item.price <= 500);
            else if (currentPriceFilter === "500-2000") filtered = filtered.filter(item => item.price >= 500 && item.price <= 2000);
            else if (currentPriceFilter === "2000+") filtered = filtered.filter(item => item.price > 2000);
        }
        
        // Search filter
        if (searchQuery) {
            filtered = filtered.filter(item => item.name.toLowerCase().includes(searchQuery.toLowerCase()));
        }
        
        // Sort
        if (currentSort === "price-asc") filtered.sort((a, b) => a.price - b.price);
        else if (currentSort === "price-desc") filtered.sort((a, b) => b.price - a.price);
        else if (currentSort === "name-asc") filtered.sort((a, b) => a.name.localeCompare(b.name));
        
        return filtered;
    }

    function renderProducts() {
        const filtered = getFilteredItems();
        const totalPages = Math.ceil(filtered.length / itemsPerPage);
        const start = (currentPage - 1) * itemsPerPage;
        const paginated = filtered.slice(start, start + itemsPerPage);
        
        document.getElementById("resultsCount").innerHTML = `${filtered.length} products`;
        
        const container = document.getElementById("productsGrid");
        container.innerHTML = paginated.map(item => `
            <div class="product-card">
                <div class="product-img"><img src="${item.image}" onerror="this.src='https://placehold.co/200x200/e74c3c/white?text=MM2'"></div>
                <div class="product-info">
                    <div class="product-name">${item.name}</div>
                    <div class="product-category">${item.category.toUpperCase()}</div>
                    <div class="product-price">₱${item.price.toLocaleString()}</div>
                    <button class="add-to-cart" onclick="addToCart(${item.id})">Add to Cart</button>
                </div>
            </div>
        `).join("");
        
        // Render pagination
        const paginationDiv = document.getElementById("pagination");
        if (totalPages > 1) {
            let pages = '<button class="page-btn" onclick="changePage(' + (currentPage - 1) + ')"><i class="fas fa-chevron-left"></i></button>';
            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                pages += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }
            pages += `<button class="page-btn" onclick="changePage(${currentPage + 1})"><i class="fas fa-chevron-right"></i></button>`;
            paginationDiv.innerHTML = pages;
        } else {
            paginationDiv.innerHTML = "";
        }
    }

    function changePage(page) {
        const filtered = getFilteredItems();
        const totalPages = Math.ceil(filtered.length / itemsPerPage);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderProducts();
    }

    function filterByCategory(category) {
        currentCategory = category;
        currentPage = 1;
        renderProducts();
    }

    function filterByPrice(range) {
        currentPriceFilter = range;
        currentPage = 1;
        renderProducts();
    }

    function searchProducts() {
        searchQuery = document.getElementById("searchInput").value;
        currentPage = 1;
        renderProducts();
    }

    function sortProducts() {
        currentSort = document.getElementById("sortSelect").value;
        currentPage = 1;
        renderProducts();
    }

    function addToCart(id) {
        if (!isLoggedIn) { showToast("Please sign in first"); handleLogin(); return; }
        const item = items.find(i => i.id === id);
        const existing = cart.find(i => i.id === id);
        if (existing) existing.qty++;
        else cart.push({ ...item, qty: 1 });
        updateCartUI();
        showToast(`${item.name} added to cart`);
    }

    function updateCartUI() {
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        const count = cart.reduce((s, i) => s + i.qty, 0);
        document.getElementById("cartCount").innerText = count;
        document.getElementById("cartTotal").innerHTML = `Total: ₱${total.toLocaleString()}`;
        const container = document.getElementById("cartItemsList");
        if (!cart.length) { container.innerHTML = "<p style='text-align:center; color:#94a3b8;'>Your cart is empty</p>"; return; }
        container.innerHTML = cart.map(item => `
            <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                <div><strong>${item.name}</strong><br>₱${item.price.toLocaleString()} x${item.qty}</div>
                <div><button onclick="removeFromCart(${item.id})" style="background:#ef4444; border:none; border-radius:30px; padding:4px 12px; color:white; cursor:pointer;">✖</button></div>
            </div>
        `).join("");
    }

    function removeFromCart(id) { cart = cart.filter(i => i.id !== id); updateCartUI(); }
    function toggleCart() { document.getElementById("cartSidebar").classList.add("open"); document.getElementById("overlay").style.display = "block"; }
    function closeCart() { document.getElementById("cartSidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; }
    function checkout() { if (cart.length === 0) showToast("Cart is empty"); else showToast("Checkout coming soon!"); }

    // Auth
    async function handleLogin() {
        try {
            const result = await window.firebaseSignInWithPopup(window.firebaseAuth, window.firebaseProvider);
            currentUser = result.user;
            isLoggedIn = true;
            document.getElementById("userInfo").innerHTML = `<div class="avatar">${currentUser.displayName?.charAt(0) || 'U'}</div><span>${currentUser.displayName?.split(' ')[0] || currentUser.email?.split('@')[0]}</span>`;
            document.getElementById("chatTabBtn").style.display = "block";
            showToast(`Welcome ${currentUser.displayName || currentUser.email}`);
        } catch (err) { showToast("Login failed"); }
    }

    window.handleAuthStateChanged = (user) => {
        if (user && !isLoggedIn) {
            currentUser = user;
            isLoggedIn = true;
            document.getElementById("userInfo").innerHTML = `<div class="avatar">${currentUser.displayName?.charAt(0) || 'U'}</div><span>${currentUser.displayName?.split(' ')[0] || currentUser.email?.split('@')[0]}</span>`;
            document.getElementById("chatTabBtn").style.display = "block";
        }
    };

    renderProducts();
</script>
</body>
</html>
