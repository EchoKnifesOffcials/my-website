/* ================== STATE ================== */

let cart = JSON.parse(localStorage.getItem("cart") || "[]"); // ✅ FIX
let currentFilter = "all";
let isLoggedIn = false;
let currentUser = null;
let currentCurrency = "PHP";

let userProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');

const exchangeRates = { PHP:1, USD:0.017, EUR:0.016, GBP:0.013 };
const currencySymbols = { PHP:"₱", USD:"$", EUR:"€", GBP:"£" };

/* ================== HELPERS ================== */

function getDisplayPrice(price){
return (price * exchangeRates[currentCurrency]).toFixed(2);
}

function getSymbol(){
return currencySymbols[currentCurrency];
}

function showToast(msg){
const t = document.getElementById('toast');
t.innerText = msg;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),3000);
}

/* ================== CART ================== */

function addToCart(id){ // ✅ removed forced login
const item = items.find(i=>i.id===id);
const existing = cart.find(i=>i.id===id);

if(existing){
existing.quantity++;
}else{
cart.push({...item,quantity:1});
}

saveCart();
updateCartUI();
showToast(item.name + " added");
}

function updateCartUI(){
localStorage.setItem("cart", JSON.stringify(cart)); // ✅ persist

let total = cart.reduce((s,i)=>s + (i.price*i.quantity),0);
let count = cart.reduce((s,i)=>s + i.quantity,0);

document.getElementById('cartCount').innerText = count;
document.getElementById('cartTotal').innerHTML = `Total: ${getSymbol()}${getDisplayPrice(total)}`;

const container = document.getElementById('cartItemsList');

if(!cart || cart.length===0){
container.innerHTML = '<p style="text-align:center;color:#888;">Cart empty</p>';
return;
}

container.innerHTML = cart.map(item=>`
<div class="cart-item">
<div>${item.name}</div>
<div>${getSymbol()}${getDisplayPrice(item.price)}</div>
<div>
<button onclick="updateQty(${item.id},${item.quantity-1})">-</button>
${item.quantity}
<button onclick="updateQty(${item.id},${item.quantity+1})">+</button>
<button onclick="removeFromCart(${item.id})">x</button>
</div>
</div>
`).join("");
}

function updateQty(id,newQty){
if(newQty < 1){
removeFromCart(id);
return;
}
const item = cart.find(i=>i.id===id);
if(item) item.quantity = newQty;
updateCartUI();
}

function removeFromCart(id){
cart = cart.filter(i=>i.id!==id);
updateCartUI();
}

/* ================== PRODUCTS ================== */

function renderProducts(){
let filtered = items.filter(i=>{
if(currentFilter==="knife") return i.type==="knife";
if(currentFilter==="gun") return i.type==="gun";
if(currentFilter==="pet") return i.type==="pet";
return true;
});

document.getElementById("productsGrid").innerHTML = filtered.map(item=>`
<div class="product-card">
<div class="product-image">
<img src="${item.image}" onerror="this.src='https://placehold.co/250x250?text=Item'">
</div>
<div class="product-info">
<div class="product-name">${item.name}</div>
<div class="product-price">${getSymbol()}${getDisplayPrice(item.price)}</div>
<button class="add-btn" onclick="addToCart(${item.id})">Add to Cart</button>
</div>
</div>
`).join("");
}

/* ================== CHECKOUT ================== */

function initiateExternalCheckout(){

if(cart.length===0){

return;
}

if(!robloxUser || robloxUser.length < 3){
showToast("Set Roblox username");
return;
}

const orderData = {
cart: JSON.parse(JSON.stringify(cart)),
currency: currentCurrency // ✅ FIX
};

sessionStorage.setItem("pendingOrder", JSON.stringify(orderData));

completeOrder(orderData); // demo direct
}

function completeOrder(orderData){

const symbol = currencySymbols[orderData.currency];
const rate = exchangeRates[orderData.currency];

const subtotal = orderData.cart.reduce((s,i)=>s+(i.price*i.quantity),0);
const total = (subtotal * rate).toFixed(2);

document.getElementById("receiptDetails").innerHTML = `
<div>Total: ${symbol}${total}</div>
<div>Items: ${orderData.cart.map(i=>i.name+" x"+i.quantity).join(", ").substring(0,120)}</div>
`;

document.getElementById("receiptModal").classList.add("show");

cart = [];
localStorage.removeItem("cart"); // ✅ FIX
updateCartUI();

showToast("Order complete");
}

/* ================== UI ================== */

function toggleCart(){
document.getElementById('cartSidebar').classList.toggle('open');
document.getElementById('overlay').classList.toggle('show');
}

function closeCart(){
document.getElementById('cartSidebar').classList.remove('open');
document.getElementById('overlay').classList.remove('show');
}

/* ================== INIT ================== */

renderProducts();
updateCartUI();
