<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ECHOKNIVES | Premium MM2 Shop</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK (for demo auth) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBAn0pSAeYVXlpBFElUvFWeCdmMduRDLss",
            authDomain: "echoknifes-5360c.firebaseapp.com",
            projectId: "echoknifes-5360c",
            storageBucket: "echoknifes-5360c.firebasestorage.app",
            messagingSenderId: "86064144525",
            appId: "1:86064144525:web:9a8dee636295e840c242c4"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        window.firebaseAuth = auth;
        window.firebaseProvider = provider;
        window.firebaseSignOut = signOut;
        window.firebaseSignInWithPopup = signInWithPopup;
        
        onAuthStateChanged(auth, (user) => {
            if (window.handleAuthStateChanged) {
                window.handleAuthStateChanged(user);
            }
        });
        
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #0f0c29 100%);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 50%, #0f0c29 0%, #1a1a3e 50%, #0f0c29 100%);
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: -1;
            animation: float 25s infinite ease-in-out;
        }

        .orb-1 { width: 600px; height: 600px; background: #6c5ce7; top: -300px; left: -300px; }
        .orb-2 { width: 500px; height: 500px; background: #a855f7; bottom: -250px; right: -250px; animation-delay: 5s; }
        .orb-3 { width: 400px; height: 400px; background: #ec4899; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 10s; opacity: 0.15; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(108, 92, 231, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 20s infinite linear;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a3e; }
        ::-webkit-scrollbar-thumb { background: #6c5ce7; border-radius: 10px; }

        .header {
            background: rgba(15, 12, 41, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(108, 92, 231, 0.3);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .logo:hover { transform: scale(1.02); }

        .logo-icon {
            font-size: 32px;
            color: #6c5ce7;
            filter: drop-shadow(0 0 10px rgba(108,92,231,0.5));
        }

        .logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            background: rgba(108, 92, 231, 0.1);
            padding: 5px;
            border-radius: 50px;
        }

        .nav-link {
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            color: #ccc;
            border: none;
            background: transparent;
            font-size: 14px;
        }

        .nav-link:hover, .nav-link.active {
            background: #6c5ce7;
            color: white;
            box-shadow: 0 0 15px rgba(108,92,231,0.4);
        }

        .top-right {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .currency-selector {
            background: rgba(108, 92, 231, 0.2);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 30px;
            padding: 8px 16px;
        }
        .currency-selector select {
            background: transparent;
            border: none;
            color: white;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(108, 92, 231, 0.2);
            border: 1px solid rgba(108, 92, 231, 0.3);
            padding: 5px 15px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #6c5ce7;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 22px;
            background: rgba(108, 92, 231, 0.2);
            border: 1px solid rgba(108, 92, 231, 0.3);
            padding: 8px 16px;
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hero & Shop */
        .hero {
            min-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 60px 5%;
            flex-wrap: wrap;
            gap: 50px;
        }
        .hero-content { flex: 1; min-width: 300px; animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hero-title {
            font-size: 58px;
            font-weight: 800;
            font-family: 'Orbitron', monospace;
        }
        .hero-title span { background: linear-gradient(135deg, #6c5ce7, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border: none;
            padding: 14px 35px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        .hero-image img { max-width: 100%; filter: drop-shadow(0 0 40px rgba(108,92,231,0.3)); border-radius: 20px; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 5%;
        }
        .filter-bar {
            background: rgba(0,0,0,0.5);
            padding: 12px 20px;
            margin-bottom: 25px;
            border-radius: 50px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }
        .filter-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .filter-btn.active { background: #6c5ce7; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }
        .product-card {
            background: linear-gradient(135deg, rgba(30,20,25,0.9), rgba(20,15,20,0.95));
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(108,92,231,0.2);
            transition: all 0.3s ease;
        }
        .product-card:hover { transform: translateY(-8px); border-color: #6c5ce7; }
        .product-image { padding: 20px; text-align: center; }
        .product-image img { width: 100px; height: 100px; object-fit: contain; }
        .product-info { padding: 18px; }
        .product-price { font-size: 22px; font-weight: 800; color: #6c5ce7; }
        .add-btn {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -450px;
            width: 450px;
            height: 100vh;
            background: rgba(15, 12, 41, 0.98);
            backdrop-filter: blur(20px);
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            border-left: 2px solid #6c5ce7;
        }
        .cart-sidebar.open { right: 0; }
        .cart-items { flex: 1; overflow-y: auto; }
        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: #10b981;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        /* Receipt Modal + Chat Support */
        .receipt-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 5000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .receipt-modal.show { display: flex; }
        .receipt-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 550px;
            border: 1px solid #6c5ce7;
            max-height: 85vh;
            overflow-y: auto;
        }
        .receipt-icon { font-size: 60px; color: #10b981; text-align: center; }
        .receipt-details { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin: 15px 0; }
        .receipt-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
        
        /* Chat Support Panel */
        .chat-support-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: #0f0f1a;
            border-radius: 20px;
            border: 1px solid #6c5ce7;
            z-index: 2000;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
        }
        .chat-support-panel.open { display: flex; }
        .chat-header {
            background: #6c5ce7;
            padding: 12px 16px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .chat-messages {
            height: 280px;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message-buyer, .message-support {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 13px;
        }
        .message-buyer { background: #2d2d44; align-self: flex-end; }
        .message-support { background: #1e1e3a; align-self: flex-start; border-left: 3px solid #6c5ce7; }
        .chat-input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #2a2a3a;
        }
        .chat-input {
            flex: 1;
            background: #1a1a2e;
            border: none;
            padding: 8px 12px;
            border-radius: 30px;
            color: white;
        }
        .chat-send {
            background: #6c5ce7;
            border: none;
            margin-left: 8px;
            padding: 8px 15px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #10b981;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 2000;
            transform: translateX(-400px);
            transition: transform 0.3s;
        }
        .toast.show { transform: translateX(0); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .overlay.show { display: block; }
        
        @media (max-width: 768px) {
            .cart-sidebar { width: 100%; right: -100%; }
            .hero-title { font-size: 38px; }
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>
<div class="particles" id="particles"></div>

<div class="header">
    <div class="logo" onclick="showHome()">
        <i class="fas fa-gem logo-icon"></i>
        <div><div class="logo-text">ECHOKNIVES</div><div class="logo-sub">PREMIUM MM2 SHOP</div></div>
    </div>
    <div class="nav-links">
        <button class="nav-link active" onclick="showHome()">🏠 Home</button>
        <button class="nav-link" onclick="showShop()">🛒 Shop</button>
    </div>
    <div class="top-right">
        <div class="currency-selector">
            <i class="fas fa-money-bill-wave"></i>
            <select id="currencySelect" onchange="changeCurrency()">
                <option value="PHP">🇵🇭 PHP</option>
                <option value="USD">🇺🇸 USD</option>
            </select>
        </div>
        <div class="user-info" id="userInfo" onclick="performGoogleLogin()">
            <div class="user-avatar" id="userAvatarDisplay"><i class="fas fa-user"></i></div>
            <span id="userNameDisplay">Guest</span>
        </div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </div>
</div>

<!-- HOME -->
<div id="homePage" class="hero">
    <div class="hero-content">
        <h1 class="hero-title">RARE <span>MM2</span><br>ITEMS</h1>
        <p class="hero-desc" style="color:#aaa; margin:20px 0;">Secure payments, fast delivery, 24/7 support.</p>
        <button class="btn-primary" onclick="showShop()">Shop Now →</button>
    </div>
    <div class="hero-image"><img src="https://i.imgur.com/hP2t6wb.jpeg" alt="MM2 Hero"></div>
</div>

<!-- SHOP PAGE -->
<div id="shopPage" class="container" style="display:none;">
    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="knife">🔪 Knives</button>
        <button class="filter-btn" data-filter="gun">🔫 Guns</button>
    </div>
    <div class="products-grid" id="productsGrid"></div>
</div>

<!-- CART SIDEBAR -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
    <div style="display:flex; justify-content:space-between;"><h3>Your Cart</h3><button class="close-cart" style="background:none; border:none; font-size:28px; color:#6c5ce7;" onclick="closeCart()">×</button></div>
    <div class="cart-items" id="cartItemsList"></div>
    <div class="cart-total" id="cartTotal" style="margin-top:20px; font-size:22px;">Total: ₱0</div>
    <button class="checkout-btn" onclick="redirectToPaymentGateway()">Proceed to Checkout →</button>
</div>

<!-- RECEIPT MODAL (after return) -->
<div class="receipt-modal" id="receiptModal">
    <div class="receipt-content">
        <div class="receipt-icon"><i class="fas fa-check-circle"></i></div>
        <div class="receipt-title" style="font-size:24px; font-weight:800; text-align:center;">Payment Successful!</div>
        <div id="receiptDetails" class="receipt-details"></div>
        <div id="systemMessage" style="background:#0a0a14; padding:12px; border-radius:12px; margin:10px 0; font-size:13px; color:#a5f7c0;"></div>
        <button class="receipt-close" onclick="closeReceipt()" style="background:#6c5ce7; width:100%; padding:12px; border:none; border-radius:30px; color:white; margin-top:10px;">Done</button>
        <button id="openChatBtn" onclick="openChatSupport()" style="background:#10b981; width:100%; padding:10px; margin-top:12px; border:none; border-radius:30px; color:white; cursor:pointer;"><i class="fas fa-headset"></i> Contact Support</button>
    </div>
</div>

<!-- CHAT SUPPORT PANEL -->
<div class="chat-support-panel" id="chatPanel">
    <div class="chat-header">
        <span><i class="fas fa-comment-dots"></i> ECHO SUPPORT</span>
        <span style="cursor:pointer;" onclick="closeChatPanel()">✕</span>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="message-support">👋 Hello! Your order is being processed. A support agent will assist you shortly. Please share your Order ID if you have any questions.</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type your message...">
        <button class="chat-send" onclick="sendBuyerMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // Items data
    const items = [
        { id: 1, name: "Batwing", type: "knife", price: 152, image: "https://i.imgur.com/H6CL03y.jpeg" },
        { id: 2, name: "Harvester", type: "knife", price: 608, image: "https://i.imgur.com/jZkbQ4t.jpeg" },
        { id: 3, name: "Icewing", type: "knife", price: 72, image: "https://i.imgur.com/jiwvmxq.jpeg" },
        { id: 4, name: "Luger", type: "gun", price: 207, image: "https://i.imgur.com/eEvMBRh.jpeg" },
        { id: 5, name: "Darkbringer", type: "gun", price: 92000, image: "https://i.imgur.com/8oxgzwa.jpeg" },
        { id: 6, name: "Lightbringer", type: "gun", price: 92000, image: "https://i.imgur.com/BUljuYV.jpeg" }
    ];

    let cart = [];
    let currentFilter = "all";
    let isLoggedIn = false;
    let currentUser = null;
    let currentCurrency = "PHP";
    let pendingOrderData = null; // store cart snapshot before redirect
    const exchangeRates = { PHP: 1, USD: 0.017 };
    const symbols = { PHP: "₱", USD: "$" };
    
    function getDisplayPrice(price) { return (price * exchangeRates[currentCurrency]).toFixed(2); }
    function getSymbol() { return symbols[currentCurrency]; }
    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    function changeCurrency() { currentCurrency = document.getElementById('currencySelect').value; renderProducts(); updateCartUI(); }

    // Navigation
    function showHome() { document.getElementById('homePage').style.display = 'flex'; document.getElementById('shopPage').style.display = 'none'; }
    function showShop() { document.getElementById('homePage').style.display = 'none'; document.getElementById('shopPage').style.display = 'block'; renderProducts(); }

    function renderProducts() {
        let filtered = items.filter(i => currentFilter === 'all' ? true : i.type === currentFilter);
        document.getElementById('productsGrid').innerHTML = filtered.map(item => `
            <div class="product-card">
                <div class="product-image"><img src="${item.image}" onerror="this.src='https://placehold.co/150x150/6c5ce7/white?text=${item.name.charAt(0)}'"></div>
                <div class="product-info">
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">${getSymbol()}${getDisplayPrice(item.price)}</div>
                    <button class="add-btn" onclick="addToCart(${item.id})">Add to Cart</button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        if (!isLoggedIn) { showToast("Please login first"); performGoogleLogin(); return; }
        const item = items.find(i => i.id === id);
        const existing = cart.find(i => i.id === id);
        if (existing) existing.quantity++;
        else cart.push({ ...item, quantity: 1 });
        updateCartUI();
        showToast(`${item.name} added`);
    }

    function updateCartUI() {
        let total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
        const count = cart.reduce((s, i) => s + i.quantity, 0);
        document.getElementById('cartCount').innerText = count;
        document.getElementById('cartTotal').innerHTML = `Total: ${getSymbol()}${getDisplayPrice(total)}`;
        const container = document.getElementById('cartItemsList');
        if (cart.length === 0) { container.innerHTML = '<p style="text-align:center;">Cart empty</p>'; return; }
        container.innerHTML = cart.map(item => `
            <div class="cart-item" style="display:flex; justify-content:space-between; margin-bottom:12px;">
                <div><strong>${item.name}</strong><br>${getSymbol()}${getDisplayPrice(item.price)} x${item.quantity}</div>
                <div><button onclick="updateQty(${item.id}, ${item.quantity-1})">-</button> <button onclick="updateQty(${item.id}, ${item.quantity+1})">+</button> <button onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i></button></div>
            </div>
        `).join('');
    }

    function updateQty(id, newQty) { if (newQty <= 0) removeFromCart(id); else { const item = cart.find(i => i.id === id); if(item) item.quantity = newQty; updateCartUI(); } }
    function removeFromCart(id) { cart = cart.filter(i => i.id !== id); updateCartUI(); }
    function toggleCart() { document.getElementById('cartSidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
    function closeCart() { document.getElementById('cartSidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

    // ---------- CHECKOUT REDIRECT LOGIC ----------
    function redirectToPaymentGateway() {
        if (!isLoggedIn) { showToast("Please login first"); performGoogleLogin(); return; }
        if (cart.length === 0) { showToast("Cart is empty"); return; }
        
        // Save current cart snapshot to sessionStorage before redirect
        const orderSnapshot = {
            items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity })),
            total: cart.reduce((s,i) => s + (i.price * i.quantity), 0),
            timestamp: Date.now(),
            userEmail: currentUser?.email || 'guest@example.com',
            robloxName: localStorage.getItem('robloxLinked') || 'Not linked'
        };
        sessionStorage.setItem('echoknives_pending_order', JSON.stringify(orderSnapshot));
        
        // Redirect to external payment demo page (echoknivesmm2.onrender.com)
        // We'll open in same tab to simulate payment gateway, then after payment it will redirect back to our site with a query param ?payment=success
        window.location.href = 'https://echoknivesmm2.onrender.com?return_url=' + encodeURIComponent(window.location.origin + window.location.pathname);
    }

    // Check for return from payment gateway
    function checkPaymentReturn() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('payment') === 'success') {
            // Payment success, retrieve pending order
            const pendingRaw = sessionStorage.getItem('echoknives_pending_order');
            if (pendingRaw) {
                const order = JSON.parse(pendingRaw);
                // Restore cart from snapshot (in case we need to clear it)
                cart = order.items.map(i => ({ ...i, image: items.find(it => it.id === i.id)?.image || '' }));
                updateCartUI();
                // Show receipt with full order details
                showReceiptWithOrder(order);
                // Clear pending
                sessionStorage.removeItem('echoknives_pending_order');
                // Remove the query param to avoid re-trigger
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                showToast("No pending order found");
            }
        }
    }

    function showReceiptWithOrder(order) {
        const subtotal = order.total;
        const orderNumber = 'EK-' + Date.now().toString(36).toUpperCase() + '-' + Math.floor(Math.random()*10000);
        const itemsList = order.items.map(i => `${i.name} x${i.quantity}`).join(', ');
        const receiptHtml = `
            <div class="receipt-row"><strong>Order #:</strong> ${orderNumber}</div>
            <div class="receipt-row"><strong>Date:</strong> ${new Date().toLocaleString()}</div>
            <div class="receipt-row"><strong>Items:</strong> ${itemsList}</div>
            <div class="receipt-row"><strong>Total Paid:</strong> ${getSymbol()}${getDisplayPrice(subtotal)}</div>
            <div class="receipt-row"><strong>Roblox User:</strong> ${order.robloxName || 'Not specified'}</div>
            <div class="receipt-row"><strong>Payment Status:</strong> <span style="color:#10b981;">✓ Completed (Demo)</span></div>
        `;
        document.getElementById('receiptDetails').innerHTML = receiptHtml;
        const systemMsgDiv = document.getElementById('systemMessage');
        systemMsgDiv.innerHTML = `📢 System Message: Your order #${orderNumber} has been received. Please wait for a support agent to assist you with delivery within 5-15 minutes. You can chat with us using the button below.`;
        
        // Store order ID for chat reference
        localStorage.setItem('lastOrderId', orderNumber);
        document.getElementById('receiptModal').classList.add('show');
        
        // Clear cart after successful payment
        cart = [];
        updateCartUI();
        closeCart();
        showToast("Order placed successfully! Check receipt.");
    }

    function closeReceipt() { document.getElementById('receiptModal').classList.remove('show'); }

    // ----- CHAT SUPPORT SYSTEM -----
    function openChatSupport() {
        const panel = document.getElementById('chatPanel');
        panel.classList.add('open');
        // Auto append system note about last order
        const lastOrder = localStorage.getItem('lastOrderId');
        if(lastOrder && !document.querySelector('.system-order-note')) {
            const msgsDiv = document.getElementById('chatMessages');
            const note = document.createElement('div');
            note.className = 'message-support system-order-note';
            note.style.fontStyle = 'italic';
            note.innerHTML = `📦 Support reference: Your last order ID is ${lastOrder}. An agent will reply soon.`;
            msgsDiv.appendChild(note);
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        }
    }
    function closeChatPanel() { document.getElementById('chatPanel').classList.remove('open'); }
    function sendBuyerMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if(!msg) return;
        const msgsDiv = document.getElementById('chatMessages');
        const buyerMsgDiv = document.createElement('div');
        buyerMsgDiv.className = 'message-buyer';
        buyerMsgDiv.innerText = msg;
        msgsDiv.appendChild(buyerMsgDiv);
        input.value = '';
        msgsDiv.scrollTop = msgsDiv.scrollHeight;
        
        // Simulate support auto-reply after 2 seconds (demo)
        setTimeout(() => {
            const supportReply = document.createElement('div');
            supportReply.className = 'message-support';
            supportReply.innerHTML = `🛡️ Support: Thank you for your message! Our team is reviewing order #${localStorage.getItem('lastOrderId') || 'pending'}. We'll deliver your items ASAP. Please stay connected.`;
            msgsDiv.appendChild(supportReply);
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        }, 2000);
    }

    // AUTH
    window.handleAuthStateChanged = function(user) {
        if(user) {
            currentUser = user;
            isLoggedIn = true;
            document.getElementById('userNameDisplay').innerText = user.displayName || user.email?.split('@')[0];
            document.getElementById('userAvatarDisplay').innerHTML = user.photoURL ? `<img src="${user.photoURL}" style="width:100%; border-radius:50%;">` : `<i class="fas fa-user"></i>`;
            // try to load roblox name from localstorage for demo
            if(!localStorage.getItem('robloxLinked')) localStorage.setItem('robloxLinked', user.displayName || 'MM2_Fan');
            showToast(`Welcome ${user.displayName || 'User'}!`);
        } else {
            isLoggedIn = false;
            currentUser = null;
            document.getElementById('userNameDisplay').innerText = 'Guest';
            document.getElementById('userAvatarDisplay').innerHTML = `<i class="fas fa-user"></i>`;
        }
        renderProducts();
    };

    async function performGoogleLogin() {
        if(!window.firebaseAuth) { showToast("Firebase loading..."); return; }
        try {
            const result = await window.firebaseSignInWithPopup(window.firebaseAuth, window.firebaseProvider);
            // handled by onAuthStateChanged
        } catch(e) { showToast("Login error"); }
    }

    // Filters & Initialization
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderProducts();
        });
    });
    
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 60; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.width = (Math.random() * 6 + 2) + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            p.style.animationDuration = (Math.random() * 15 + 10) + 's';
            container.appendChild(p);
        }
    }
    createParticles();
    checkPaymentReturn();
    showHome();
    window.showHome = showHome; window.showShop = showShop; window.addToCart = addToCart; window.updateQty = updateQty; window.removeFromCart = removeFromCart;
    window.toggleCart = toggleCart; window.closeCart = closeCart; window.changeCurrency = changeCurrency; window.performGoogleLogin = performGoogleLogin;
    window.redirectToPaymentGateway = redirectToPaymentGateway; window.closeReceipt = closeReceipt; window.openChatSupport = openChatSupport;
    window.closeChatPanel = closeChatPanel; window.sendBuyerMessage = sendBuyerMessage;
    renderProducts();
</script>
</body>
</html>
