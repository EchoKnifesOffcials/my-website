<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ECHOKNIVES | Verify Roblox</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #0f0c29 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 50%, #0f0c29 0%, #1a1a3e 50%, #0f0c29 100%);
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: -1;
            animation: float 25s infinite ease-in-out;
        }

        .orb-1 { width: 400px; height: 400px; background: #6c5ce7; top: -200px; left: -200px; }
        .orb-2 { width: 350px; height: 350px; background: #a855f7; bottom: -150px; right: -150px; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(108, 92, 231, 0.3);
            border-radius: 50%;
            animation: particleFloat 15s infinite linear;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        .card {
            background: rgba(15, 12, 41, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(108, 92, 231, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            margin-bottom: 20px;
        }

        .logo-icon {
            font-size: 48px;
            color: #6c5ce7;
            filter: drop-shadow(0 0 15px rgba(108, 92, 231, 0.5));
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888;
            font-size: 12px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Avatar Circle */
        .avatar-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: #1e1e3a;
            border: 3px solid #6c5ce7;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.4);
            transition: all 0.3s ease;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Input Field - Just type, no button needed! */
        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c5ce7;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 60px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #6c5ce7;
            background: rgba(108, 92, 231, 0.1);
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.2);
        }

        input::placeholder {
            color: #666;
            font-weight: 400;
        }

        /* Status Message */
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 30px;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .status-loading {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .status-success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Username Display */
        .username-display {
            margin-top: 15px;
            font-size: 18px;
            font-weight: 600;
            color: #a855f7;
        }

        /* Continue Button (appears after verification) */
        .continue-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            display: none;
        }

        .continue-btn.show {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        .continue-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }

        /* Hint text */
        .hint {
            font-size: 11px;
            color: #555;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>
<div class="particles" id="particles"></div>

<div class="card">
    <div class="logo">
        <i class="fas fa-gem logo-icon"></i>
        <h1>ECHOKNIVES</h1>
        <div class="subtitle">VERIFY YOUR ROBLOX ACCOUNT</div>
    </div>

    <!-- Avatar Circle -->
    <div class="avatar-container">
        <img id="avatarImg" src="https://ui-avatars.com/api/?name=Roblox&background=6c5ce7&color=fff&size=140" alt="Avatar">
    </div>

    <!-- Username Display -->
    <div id="usernameDisplay" class="username-display"></div>

    <!-- Input - Just type your username! -->
    <div class="input-wrapper">
        <i class="fab fa-roblox input-icon"></i>
        <input type="text" id="usernameInput" placeholder="Type your Roblox username..." autocomplete="off" spellcheck="false">
    </div>

    <!-- Status Message -->
    <div id="status" class="status"></div>

    <!-- Continue Button (appears after successful verification) -->
    <button id="continueBtn" class="continue-btn" onclick="continueToCheckout()">
        <i class="fas fa-check-circle"></i> Yes, That's me! Continue →
    </button>

    <div class="hint">
        <i class="fas fa-magic"></i> Just type your username - avatar loads automatically!
    </div>
</div>

<script>
    // 👇 CHANGE THIS TO YOUR RENDER MIDDLEMAN URL!
    const MIDDLEMAN_URL = "https://roblox-middleman.onrender.com";
    
    // If you don't have a middleman yet, use the free proxy (works but slower)
    // const MIDDLEMAN_URL = "https://api.allorigins.win/raw?url=";
    // Then the fetch URL would be different. Let me know if you need the proxy version.

    let currentVerifiedUser = null;
    let debounceTimer = null;

    // Get DOM elements
    const usernameInput = document.getElementById('usernameInput');
    const avatarImg = document.getElementById('avatarImg');
    const usernameDisplay = document.getElementById('usernameDisplay');
    const statusDiv = document.getElementById('status');
    const continueBtn = document.getElementById('continueBtn');

    // Auto-load saved user
    const saved = localStorage.getItem('verifiedRoblox');
    if (saved) {
        try {
            const data = JSON.parse(saved);
            usernameInput.value = data.username;
            if (data.avatarUrl) {
                avatarImg.src = data.avatarUrl;
            }
            usernameDisplay.innerHTML = `<i class="fas fa-user-check"></i> @${data.username}`;
            statusDiv.innerHTML = "✅ Verified! You can continue to checkout.";
            statusDiv.className = "status status-success";
            currentVerifiedUser = data;
            continueBtn.classList.add('show');
        } catch(e) {}
    }

    // Fetch Roblox avatar using middleman
    async function fetchRobloxAvatar(username) {
        if (!username || username.trim() === "") {
            // Reset to default
            avatarImg.src = "https://ui-avatars.com/api/?name=Roblox&background=6c5ce7&color=fff&size=140";
            usernameDisplay.innerHTML = "";
            statusDiv.innerHTML = "Enter your Roblox username above";
            statusDiv.className = "status";
            continueBtn.classList.remove('show');
            currentVerifiedUser = null;
            return;
        }

        const cleanUsername = username.trim();
        
        // Show loading state
        avatarImg.src = "https://ui-avatars.com/api/?name=Loading&background=f59e0b&color=fff&size=140";
        statusDiv.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> Looking up @${cleanUsername}...`;
        statusDiv.className = "status status-loading";
        usernameDisplay.innerHTML = "";
        continueBtn.classList.remove('show');
        currentVerifiedUser = null;

        try {
            // Call your middleman
            const response = await fetch(`${MIDDLEMAN_URL}/api/roblox/${encodeURIComponent(cleanUsername)}`);
            const data = await response.json();

            if (data.success && data.avatarUrl) {
                // Success - show avatar and username
                avatarImg.src = data.avatarUrl;
                usernameDisplay.innerHTML = `<i class="fas fa-check-circle"></i> @${data.username}`;
                statusDiv.innerHTML = `✅ Verified! Welcome ${data.displayName || data.username}`;
                statusDiv.className = "status status-success";
                
                // Store verified user
                currentVerifiedUser = {
                    username: data.username,
                    displayName: data.displayName,
                    userId: data.userId,
                    avatarUrl: data.avatarUrl
                };
                
                // Save to localStorage
                localStorage.setItem('verifiedRoblox', JSON.stringify(currentVerifiedUser));
                
                // Show continue button
                continueBtn.classList.add('show');
                
            } else {
                // User not found
                avatarImg.src = "https://ui-avatars.com/api/?name=Not+Found&background=ef4444&color=fff&size=140";
                usernameDisplay.innerHTML = "";
                statusDiv.innerHTML = `❌ "${cleanUsername}" not found on Roblox. Check spelling?`;
                statusDiv.className = "status status-error";
                continueBtn.classList.remove('show');
                currentVerifiedUser = null;
                localStorage.removeItem('verifiedRoblox');
            }

        } catch (error) {
            console.error("Error:", error);
            avatarImg.src = "https://ui-avatars.com/api/?name=Error&background=ef4444&color=fff&size=140";
            usernameDisplay.innerHTML = "";
            statusDiv.innerHTML = `⚠️ Cannot connect to verification server. Make sure your middleman is running!`;
            statusDiv.className = "status status-error";
            continueBtn.classList.remove('show');
            currentVerifiedUser = null;
        }
    }

    // Handle input with debounce (waits for user to stop typing)
    function onUsernameInput() {
        const username = usernameInput.value;
        
        // Clear previous timer
        if (debounceTimer) {
            clearTimeout(debounceTimer);
        }
        
        // Wait 500ms after user stops typing before fetching
        debounceTimer = setTimeout(() => {
            fetchRobloxAvatar(username);
        }, 500);
    }

    // Continue to checkout
    function continueToCheckout() {
        if (currentVerifiedUser) {
            // Save to localStorage for the shop page
            localStorage.setItem('verifiedRoblox', JSON.stringify(currentVerifiedUser));
            
            // Show success message
            statusDiv.innerHTML = `✅ Verified as @${currentVerifiedUser.username}! Redirecting to shop...`;
            statusDiv.className = "status status-success";
            
            // Redirect to your shop page (change this to your actual shop URL)
            setTimeout(() => {
                // If you have a separate shop page, uncomment below:
                // window.location.href = "shop.html";
                
                // For now, show an alert
                alert(`✅ Verified! You are @${currentVerifiedUser.username}\n\nYou can now proceed with checkout.`);
            }, 500);
        } else {
            statusDiv.innerHTML = "⚠️ Please enter a valid Roblox username first";
            statusDiv.className = "status status-error";
        }
    }

    // Attach event listener
    usernameInput.addEventListener('input', onUsernameInput);
    
    // Allow Enter key to trigger continue if verified
    usernameInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && currentVerifiedUser) {
            continueToCheckout();
        }
    });

    // Create particles
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.width = (Math.random() * 6 + 2) + 'px';
            p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            p.style.animationDuration = (Math.random() * 15 + 10) + 's';
            p.style.opacity = Math.random() * 0.5;
            container.appendChild(p);
        }
    }
    createParticles();
</script>
</body>
</html>
