<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ECHOKNIVES | Premium MM2 Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBAn0pSAeYVXlpBFElUvFWeCdmMduRDLss",
            authDomain: "echoknifes-5360c.firebaseapp.com",
            projectId: "echoknifes-5360c",
            storageBucket: "echoknifes-5360c.firebasestorage.app",
            messagingSenderId: "86064144525",
            appId: "1:86064144525:web:9a8dee636295e840c242c4"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        window.firebaseAuth = auth;
        window.firebaseProvider = provider;
        window.firebaseSignOut = signOut;
        window.firebaseSignInWithPopup = signInWithPopup;
        
        onAuthStateChanged(auth, (user) => {
            if (window.handleAuthStateChanged) {
                window.handleAuthStateChanged(user);
            }
        });
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        /* VFX Background */
        .vfx-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle-field {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            background: rgba(99, 102, 241, 0.25);
            border-radius: 50%;
            animation: floatParticle 22s infinite linear;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            15% { opacity: 0.7; }
            85% { opacity: 0.7; }
            100% { transform: translateY(-100vh) translateX(80px); opacity: 0; }
        }

        /* Header */
        .header {
            background: rgba(8, 8, 14, 0.8);
            backdrop-filter: blur(16px);
            padding: 14px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .logo-icon {
            font-size: 32px;
            color: #6366f1;
            filter: drop-shadow(0 0 8px #6366f1);
        }
        .logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 8px;
            background: #14141e;
            padding: 5px;
            border-radius: 60px;
        }
        .nav-link {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            background: transparent;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-link.active {
            background: #6366f1;
            color: white;
        }
        .top-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #14141e;
            padding: 5px 14px;
            border-radius: 40px;
        }
        .avatar {
            width: 32px;
            height: 32px;
            background: #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-icon {
            position: relative;
            cursor: pointer;
            background: #14141e;
            padding: 8px 16px;
            border-radius: 40px;
        }
        .cart-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            border-radius: 30px;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hero Section */
        .hero {
            min-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 60px 5%;
            flex-wrap: wrap;
            gap: 40px;
        }
        .hero-content { flex: 1; min-width: 280px; }
        .hero-badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            color: #a855f7;
            margin-bottom: 20px;
        }
        .hero-title {
            font-size: 58px;
            font-weight: 800;
            font-family: 'Orbitron', monospace;
            margin-bottom: 20px;
        }
        .hero-title span {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        .hero-image img {
            max-width: 100%;
            filter: drop-shadow(0 0 25px rgba(99,102,241,0.3));
            animation: floatSoft 4s infinite;
        }
        @keyframes floatSoft {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-12px); }
        }

        /* Shop Section */
        .shop-section {
            display: none;
            padding: 40px 5%;
        }
        .shop-section.active {
            display: block;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 28px;
        }
        .product-card {
            background: #111117;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #262633;
            transition: 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
        }
        .product-img {
            background: #08080e;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .product-img img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }
        .product-info {
            padding: 18px;
        }
        .product-price {
            font-size: 26px;
            font-weight: 800;
            color: #6366f1;
            margin: 8px 0;
        }
        .add-to-cart {
            width: 100%;
            padding: 10px;
            background: #6366f1;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* ===== CHECKOUT MODAL (Full Screen) ===== */
        .checkout-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 40px 20px;
        }
        .checkout-modal.show {
            display: flex;
        }
        .checkout-container {
            max-width: 700px;
            width: 100%;
            background: #111117;
            border-radius: 48px;
            border: 1px solid #262633;
            overflow: hidden;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .checkout-header {
            padding: 24px 28px;
            border-bottom: 1px solid #262633;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .checkout-header h2 {
            font-size: 24px;
            font-weight: 700;
        }
        .close-checkout {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #94a3b8;
        }
        .checkout-body {
            padding: 28px;
        }
        .order-summary {
            background: #1a1a24;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 28px;
        }
        .order-summary h3 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #6366f1;
        }
        .summary-items {
            margin-bottom: 16px;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #262633;
        }
        .summary-total {
            display: flex;
            justify-content: space-between;
            padding-top: 16px;
            font-weight: 700;
            font-size: 18px;
            border-top: 2px solid #6366f1;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #cbd5e1;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: #1e1e2a;
            border: 1px solid #2a2a36;
            border-radius: 60px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #6366f1;
        }
        .form-group textarea {
            border-radius: 24px;
            resize: vertical;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .tip-options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .tip-btn {
            background: #1e1e2a;
            border: 1px solid #2a2a36;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }
        .tip-btn.selected {
            background: #6366f1;
            border-color: #6366f1;
        }
        .tip-custom {
            flex: 1;
            min-width: 100px;
        }
        .checkout-footer {
            padding: 20px 28px;
            border-top: 1px solid #262633;
            display: flex;
            gap: 16px;
            justify-content: flex-end;
        }
        .btn-cancel {
            background: #1e1e2a;
            border: 1px solid #2a2a36;
            padding: 14px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-place-order {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        /* Chat Section */
        .chat-section {
            display: none;
            padding: 40px 5%;
            min-height: 70vh;
        }
        .chat-section.active {
            display: block;
        }
        .chat-container {
            display: flex;
            gap: 30px;
            background: #111117;
            border-radius: 32px;
            border: 1px solid #262633;
            overflow: hidden;
            min-height: 600px;
        }
        .conversation-list {
            width: 300px;
            border-right: 1px solid #262633;
            padding: 20px;
            overflow-y: auto;
        }
        .conversation-item {
            padding: 14px;
            border-radius: 24px;
            cursor: pointer;
            margin-bottom: 8px;
            background: #1a1a24;
            transition: 0.2s;
        }
        .conversation-item.active {
            background: #6366f1;
        }
        .conversation-name {
            font-weight: 600;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .chat-messages {
            flex: 1;
            height: 480px;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 70%;
            padding: 10px 18px;
            border-radius: 24px;
            font-size: 14px;
        }
        .message.sent {
            background: #6366f1;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }
        .message.received {
            background: #1e1e2a;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }
        .chat-input-area {
            display: flex;
            gap: 12px;
        }
        .chat-input {
            flex: 1;
            padding: 12px;
            background: #1e1e2a;
            border: 1px solid #2a2a36;
            border-radius: 60px;
            color: white;
            outline: none;
        }
        .send-btn {
            background: #6366f1;
            border: none;
            padding: 0 24px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -450px;
            width: 400px;
            height: 100vh;
            background: #0d0d13;
            z-index: 200;
            transition: 0.25s;
            padding: 24px;
            border-left: 2px solid #6366f1;
        }
        .cart-sidebar.open {
            right: 0;
        }
        .cart-total {
            font-size: 22px;
            font-weight: 800;
            margin: 20px 0;
        }
        .checkout-btn-cart {
            width: 100%;
            padding: 14px;
            background: #10b981;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 150;
            display: none;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 300;
            transform: translateX(400px);
            transition: 0.2s;
        }
        .toast.show {
            transform: translateX(0);
        }

        @media (max-width: 700px) {
            .cart-sidebar { width: 100%; right: -100%; }
            .chat-container { flex-direction: column; }
            .conversation-list { width: 100%; }
            .hero-title { font-size: 38px; }
            .row-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="vfx-layer">
    <div class="particle-field" id="particles"></div>
</div>

<div class="header">
    <div class="logo" onclick="showHome()">
        <i class="fas fa-gem logo-icon"></i>
        <div class="logo-text">ECHOKNIVES</div>
    </div>
    <div class="nav-links">
        <button class="nav-link" onclick="showHome()">🏠 Home</button>
        <button class="nav-link" onclick="showShop()">🛒 Shop</button>
        <button class="nav-link" id="chatTabBtn" onclick="showChat()" style="display:none;">💬 Messages</button>
    </div>
    <div class="top-actions">
        <div class="user-info" id="userInfo">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <span>Guest</span>
            <button class="login-header-btn" onclick="handleLogin()" style="background:#6366f1; border:none; padding:6px 14px; border-radius:30px; color:white;">Login</button>
        </div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </div>
</div>

<!-- HOME PAGE -->
<div id="homePage" class="hero">
    <div class="hero-content">
        <div class="hero-badge">✨ PREMIUM MM2 SHOP ✨</div>
        <h1 class="hero-title">RARE <span>MM2</span><br>ITEMS</h1>
        <p class="hero-desc" style="margin: 20px 0; color: #94a3b8;">Secure payments · Fast delivery · 24/7 support</p>
        <button class="btn-primary" onclick="showShop()">Start Shopping →</button>
    </div>
    <div class="hero-image">
        <img src="https://i.imgur.com/hP2t6wb.jpeg" alt="MM2 Hero">
    </div>
</div>

<!-- SHOP SECTION -->
<div id="shopSection" class="shop-section">
    <div class="products-grid" id="productsGrid"></div>
</div>

<!-- CHAT SECTION -->
<div id="chatSection" class="chat-section">
    <div class="chat-container">
        <div class="conversation-list" id="conversationList"></div>
        <div class="chat-area">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Type your message...">
                <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </div>
    </div>
</div>

<!-- CHECKOUT MODAL (FULL SCREEN) -->
<div id="checkoutModal" class="checkout-modal">
    <div class="checkout-container">
        <div class="checkout-header">
            <h2><i class="fas fa-credit-card"></i> Complete Your Order</h2>
            <button class="close-checkout" onclick="closeCheckout()">×</button>
        </div>
        <div class="checkout-body">
            <!-- Order Summary -->
            <div class="order-summary">
                <h3>📦 Order Summary</h3>
                <div id="checkoutItemsList" class="summary-items"></div>
                <div class="summary-total" id="checkoutTotal">Total: ₱0</div>
            </div>
            
            <!-- Delivery Information -->
            <div class="form-group">
                <label>🎮 Roblox Username <span style="color:#ef4444;">*</span></label>
                <input type="text" id="checkoutRobloxUser" placeholder="Enter your Roblox username">
            </div>
            
            <div class="row-2">
                <div class="form-group">
                    <label>📧 Email Address <span style="color:#ef4444;">*</span></label>
                    <input type="email" id="checkoutEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>📞 Discord Username (optional)</label>
                    <input type="text" id="checkoutDiscord" placeholder="Discord#0000">
                </div>
            </div>
            
            <div class="form-group">
                <label>📍 Delivery Instructions (optional)</label>
                <textarea id="checkoutInstructions" rows="2" placeholder="Any special instructions for delivery?"></textarea>
            </div>
            
            <!-- Tip Section (Like Luger.gg) -->
            <div class="form-group">
                <label>💝 Support the team - Add a tip!</label>
                <div class="tip-options">
                    <button type="button" class="tip-btn" data-tip="0">No tip</button>
                    <button type="button" class="tip-btn" data-tip="5">₱5</button>
                    <button type="button" class="tip-btn" data-tip="10">₱10</button>
                    <button type="button" class="tip-btn" data-tip="25">₱25</button>
                    <button type="button" class="tip-btn" data-tip="50">₱50</button>
                    <input type="number" id="customTip" class="tip-custom" placeholder="Custom ₱" min="0" step="5">
                </div>
            </div>
        </div>
        <div class="checkout-footer">
            <button class="btn-cancel" onclick="closeCheckout()">Cancel</button>
            <button class="btn-place-order" onclick="placeOrder()">Place Order →</button>
        </div>
    </div>
</div>

<!-- CART SIDEBAR -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
    <div style="display:flex; justify-content:space-between; margin-bottom:24px;"><h3>Your cart</h3><button onclick="closeCart()" style="background:none; border:none; font-size:24px; color:white;">✖</button></div>
    <div id="cartItemsList" style="flex:1; overflow-y:auto;"></div>
    <div class="cart-total" id="cartTotal">Total: ₱0</div>
    <button class="checkout-btn-cart" onclick="openCheckout()">Proceed to Checkout →</button>
</div>

<div class="toast" id="toastMsg"></div>

<script>
    // Particles
    for (let i = 0; i < 80; i++) {
        let p = document.createElement('div');
        p.className = 'particle';
        p.style.width = (Math.random() * 6 + 2) + 'px';
        p.style.height = p.style.width;
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 20 + 's';
        p.style.animationDuration = (Math.random() * 15 + 8) + 's';
        document.getElementById('particles').appendChild(p);
    }

    // ========== GLOBAL STATE ==========
    let isLoggedIn = false;
    let currentUser = null;
    let isAdmin = false;
    let cart = [];
    let conversations = {};
    let selectedTip = 0;

    // ========== ITEMS ==========
    const items = [
        { id: 1, name: "Icewing", price: 72, image: "https://i.imgur.com/jiwvmxq.jpeg" },
        { id: 2, name: "Batwing", price: 152, image: "https://i.imgur.com/H6CL03y.jpeg" },
        { id: 3, name: "Harvester", price: 608, image: "https://i.imgur.com/jZkbQ4t.jpeg" },
        { id: 4, name: "Luger", price: 207, image: "https://i.imgur.com/eEvMBRh.jpeg" },
        { id: 5, name: "Darkbringer", price: 92000, image: "https://i.imgur.com/8oxgzwa.jpeg" },
        { id: 6, name: "Lightbringer", price: 92000, image: "https://i.imgur.com/BUljuYV.jpeg" }
    ];

    // ========== UI FUNCTIONS ==========
    function showToast(msg) {
        const t = document.getElementById("toastMsg");
        t.innerText = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
    }

    function showHome() {
        document.getElementById("homePage").style.display = "flex";
        document.getElementById("shopSection").classList.remove("active");
        document.getElementById("chatSection").classList.remove("active");
        document.querySelectorAll(".nav-link").forEach(l => l.classList.remove("active"));
        document.querySelector(".nav-link:first-child").classList.add("active");
    }

    function showShop() {
        document.getElementById("homePage").style.display = "none";
        document.getElementById("shopSection").classList.add("active");
        document.getElementById("chatSection").classList.remove("active");
        document.querySelectorAll(".nav-link").forEach(l => l.classList.remove("active"));
        document.querySelectorAll(".nav-link")[1].classList.add("active");
        renderProducts();
    }

    function showChat() {
        document.getElementById("homePage").style.display = "none";
        document.getElementById("shopSection").classList.remove("active");
        document.getElementById("chatSection").classList.add("active");
        document.querySelectorAll(".nav-link").forEach(l => l.classList.remove("active"));
        document.getElementById("chatTabBtn").classList.add("active");
        loadConversations();
    }

    function renderProducts() {
        const container = document.getElementById("productsGrid");
        container.innerHTML = items.map(item => `
            <div class="product-card">
                <div class="product-img"><img src="${item.image}" onerror="this.src='https://placehold.co/200x200/6366f1/white?text=MM2'" alt="${item.name}"></div>
                <div class="product-info">
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">₱${item.price.toLocaleString()}</div>
                    <button class="add-to-cart" onclick="addToCart(${item.id})">Add to cart</button>
                </div>
            </div>
        `).join("");
    }

    function addToCart(id) {
        if (!isLoggedIn) { showToast("Please login first"); handleLogin(); return; }
        const item = items.find(i => i.id === id);
        const existing = cart.find(i => i.id === id);
        if (existing) existing.qty++;
        else cart.push({ ...item, qty: 1 });
        updateCartUI();
        showToast(`${item.name} added to cart`);
    }

    function updateCartUI() {
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        const count = cart.reduce((s, i) => s + i.qty, 0);
        document.getElementById("cartCount").innerText = count;
        document.getElementById("cartTotal").innerHTML = `Total: ₱${total.toLocaleString()}`;
        const container = document.getElementById("cartItemsList");
        if (!cart.length) { container.innerHTML = "<p style='text-align:center; margin-top:20px'>Cart is empty</p>"; return; }
        container.innerHTML = cart.map(item => `
            <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                <div><strong>${item.name}</strong><br>₱${item.price.toLocaleString()} x${item.qty}</div>
                <div><button onclick="removeItem(${item.id})" style="background:#ef4444; border:none; border-radius:30px; padding:4px 12px;">✖</button></div>
            </div>
        `).join("");
    }

    function removeItem(id) { cart = cart.filter(i => i.id !== id); updateCartUI(); }
    function toggleCart() { document.getElementById("cartSidebar").classList.add("open"); document.getElementById("overlay").style.display = "block"; }
    function closeCart() { document.getElementById("cartSidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; }

    // ===== CHECKOUT SYSTEM =====
    function openCheckout() {
        if (!isLoggedIn) { showToast("Please login first"); handleLogin(); return; }
        if (cart.length === 0) { showToast("Your cart is empty"); return; }
        
        // Populate checkout summary
        const container = document.getElementById("checkoutItemsList");
        const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        container.innerHTML = cart.map(item => `
            <div class="summary-item">
                <span>${item.name} x${item.qty}</span>
                <span>₱${(item.price * item.qty).toLocaleString()}</span>
            </div>
        `).join("");
        
        document.getElementById("checkoutTotal").innerHTML = `Total: ₱${subtotal.toLocaleString()}`;
        document.getElementById("checkoutModal").classList.add("show");
        closeCart();
        
        // Setup tip buttons
        selectedTip = 0;
        document.querySelectorAll(".tip-btn").forEach(btn => {
            btn.classList.remove("selected");
            if (btn.dataset.tip === "0") btn.classList.add("selected");
        });
        document.getElementById("customTip").value = "";
    }

    function closeCheckout() { document.getElementById("checkoutModal").classList.remove("show"); }

    // Tip button handlers
    document.querySelectorAll(".tip-btn").forEach(btn => {
        btn.addEventListener("click", function() {
            document.querySelectorAll(".tip-btn").forEach(b => b.classList.remove("selected"));
            this.classList.add("selected");
            selectedTip = parseInt(this.dataset.tip);
            document.getElementById("customTip").value = "";
            updateCheckoutTotal();
        });
    });

    document.getElementById("customTip").addEventListener("input", function() {
        document.querySelectorAll(".tip-btn").forEach(b => b.classList.remove("selected"));
        selectedTip = parseInt(this.value) || 0;
        updateCheckoutTotal();
    });

    function updateCheckoutTotal() {
        const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        const total = subtotal + selectedTip;
        document.getElementById("checkoutTotal").innerHTML = `Subtotal: ₱${subtotal.toLocaleString()}<br>Tip: ₱${selectedTip.toLocaleString()}<br><strong>Total: ₱${total.toLocaleString()}</strong>`;
    }

    function placeOrder() {
        const robloxUser = document.getElementById("checkoutRobloxUser").value.trim();
        const email = document.getElementById("checkoutEmail").value.trim();
        
        if (!robloxUser) { showToast("Please enter your Roblox username"); return; }
        if (!email) { showToast("Please enter your email address"); return; }
        
        const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        const total = subtotal + selectedTip;
        const orderNumber = 'EK-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2, 4).toUpperCase();
        
        // Create order object
        const order = {
            orderNumber: orderNumber,
            items: cart.map(i => `${i.name} x${i.qty}`).join(', '),
            subtotal: `₱${subtotal.toLocaleString()}`,
            tip: `₱${selectedTip.toLocaleString()}`,
            total: `₱${total.toLocaleString()}`,
            robloxUser: robloxUser,
            email: email,
            discord: document.getElementById("checkoutDiscord").value,
            instructions: document.getElementById("checkoutInstructions").value,
            status: "pending",
            date: new Date().toLocaleString()
        };
        
        // Save order to localStorage
        let orders = JSON.parse(localStorage.getItem('orders') || '[]');
        orders.push(order);
        localStorage.setItem('orders', JSON.stringify(orders));
        
        // Send receipt message to chat
        if (!conversations[currentUser?.uid]) conversations[currentUser.uid] = [];
        let conv = conversations[currentUser.uid].find(c => c.with === "ECHOKNIVES Support");
        if (!conv) {
            conv = { with: "ECHOKNIVES Support", messages: [] };
            conversations[currentUser.uid].push(conv);
        }
        conv.messages.push({
            sender: "system",
            text: `✅ ORDER PLACED! #${orderNumber}\n\nItems: ${order.items}\nTotal: ${order.total}\nRoblox: @${robloxUser}\n\n📦 Delivery instructions have been sent to the team. You will be notified when your order is ready.`,
            time: Date.now()
        });
        localStorage.setItem("echoknives_conversations", JSON.stringify(conversations));
        
        // Show success and clear cart
        showToast(`✅ Order placed! Order #${orderNumber}`);
        cart = [];
        updateCartUI();
        closeCheckout();
        
        // Show receipt in chat
        if (isLoggedIn) loadConversations();
        
        // Optional: Send to Discord webhook
        fetch('https://discord.com/api/webhooks/1488808773492543508/bpbJDBX3v1LLJXo0ri3xbi1Lbpu7BGXzVR1z4aCy1pP0bFqJsRrqM_ncNTi5ToDiCZ4d', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                embeds: [{
                    title: '🛒 NEW ORDER!',
                    color: 0x6366f1,
                    fields: [
                        { name: 'Order #', value: orderNumber, inline: true },
                        { name: 'Customer', value: email, inline: true },
                        { name: 'Roblox', value: robloxUser, inline: true },
                        { name: 'Items', value: order.items, inline: false },
                        { name: 'Subtotal', value: order.subtotal, inline: true },
                        { name: 'Tip', value: order.tip, inline: true },
                        { name: 'Total', value: order.total, inline: true }
                    ],
                    timestamp: new Date().toISOString()
                }]
            })
        }).catch(e => console.error);
    }

    // ===== AUTH =====
    async function handleLogin() {
        try {
            const result = await window.firebaseSignInWithPopup(window.firebaseAuth, window.firebaseProvider);
            currentUser = result.user;
            isLoggedIn = true;
            isAdmin = (currentUser.email === "ivanmendones13@gmail.com");
            updateUserUI();
            showToast(`Welcome ${currentUser.displayName || currentUser.email}`);
            document.getElementById("chatTabBtn").style.display = "block";
            loadConversations();
            renderProducts();
        } catch (err) { showToast("Login failed"); }
    }

    function logout() {
        window.firebaseSignOut(window.firebaseAuth).then(() => {
            isLoggedIn = false;
            currentUser = null;
            cart = [];
            updateCartUI();
            updateUserUI();
            document.getElementById("chatTabBtn").style.display = "none";
            showToast("Logged out");
            renderProducts();
        });
    }

    function updateUserUI() {
        const userDiv = document.getElementById("userInfo");
        if (isLoggedIn && currentUser) {
            userDiv.innerHTML = `<div class="avatar">${currentUser.displayName?.charAt(0) || 'U'}</div><span>${currentUser.displayName?.split(' ')[0] || currentUser.email?.split('@')[0]}</span><button onclick="logout()" style="background:#ef4444; border:none; padding:6px 14px; border-radius:30px; color:white;">Logout</button>`;
        } else {
            userDiv.innerHTML = `<div class="avatar"><i class="fas fa-user"></i></div><span>Guest</span><button class="login-header-btn" onclick="handleLogin()" style="background:#6366f1; border:none; padding:6px 14px; border-radius:30px; color:white;">Login</button>`;
        }
    }

    window.handleAuthStateChanged = (user) => {
        if (user && !isLoggedIn) {
            currentUser = user;
            isLoggedIn = true;
            isAdmin = (user.email === "ivanmendones13@gmail.com");
            updateUserUI();
            document.getElementById("chatTabBtn").style.display = "block";
            loadConversations();
            renderProducts();
        }
    };

    // ===== CHAT =====
    function loadConversations() {
        if (!currentUser) return;
        const convs = conversations[currentUser.uid] || [];
        const listDiv = document.getElementById("conversationList");
        if (!convs.length) { listDiv.innerHTML = "<div style='padding:16px; text-align:center; color:#64748b'>No conversations</div>"; return; }
        listDiv.innerHTML = convs.map((conv, idx) => `<div class="conversation-item ${idx === 0 ? 'active' : ''}" onclick="selectConversation(${idx})"><div class="conversation-name">${conv.with}</div></div>`).join("");
        if (convs.length) selectConversation(0);
    }

    function selectConversation(idx) {
        const convs = conversations[currentUser.uid] || [];
        if (!convs[idx]) return;
        const messages = convs[idx].messages || [];
        const container = document.getElementById("chatMessages");
        container.innerHTML = messages.map(msg => `<div class="message ${msg.sender === currentUser.uid ? 'sent' : 'received'}">${msg.text}<div class="message-time">${new Date(msg.time).toLocaleTimeString()}</div></div>`).join("");
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
        if (!isLoggedIn) { showToast("Login to chat"); handleLogin(); return; }
        const input = document.getElementById("chatInput");
        const text = input.value.trim();
        if (!text) return;
        if (!conversations[currentUser.uid]) conversations[currentUser.uid] = [];
        let conv = conversations[currentUser.uid][0];
        if (!conv) {
            conv = { with: "ECHOKNIVES Support", messages: [] };
            conversations[currentUser.uid].push(conv);
        }
        conv.messages.push({ sender: currentUser.uid, text, time: Date.now() });
        localStorage.setItem("echoknives_conversations", JSON.stringify(conversations));
        input.value = "";
        selectConversation(0);
    }

    // Load saved conversations
    const savedConvs = localStorage.getItem("echoknives_conversations");
    if (savedConvs) conversations = JSON.parse(savedConvs);

    renderProducts();
    updateCartUI();
    showHome();
    updateUserUI();
</script>
</body>
</html>
