<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EchoKnives | Global MM2 Trading & Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, updateDoc, doc, deleteDoc, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBCXRjm9iSht9xKhKommS6aDzMGWqYJRO4",
            authDomain: "echoknives-ca45e.firebaseapp.com",
            projectId: "echoknives-ca45e",
            storageBucket: "echoknives-ca45e.firebasestorage.app",
            messagingSenderId: "434863562437",
            appId: "1:434863562437:web:94b6ece21ad684d1bcdaac"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Make db available globally
        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.where = where;
        window.updateDoc = updateDoc;
        window.doc = doc;
        window.deleteDoc = deleteDoc;
        window.orderBy = orderBy;
        window.limit = limit;
        window.getDocs = getDocs;
        
        console.log("🔥 Firebase connected!");
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0f;
            --bg-surface: #111118;
            --card-bg: #181822;
            --border: #2a2a38;
            --accent: #b97cfc;
            --accent-pink: #ff6b9d;
            --text-primary: #eaeef2;
            --text-secondary: #8e8e9e;
            --shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        body {
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* revolving grey/black VFX */
        .vortex {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle at 30% 40%, rgba(120,120,150,0.08), transparent 70%);
        }
        .vortex::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: conic-gradient(from 0deg, #2a2a38, #1a1a26, #2a2a38, #1a1a26);
            animation: spinSlow 20s linear infinite;
            border-radius: 40%;
            opacity: 0.35;
        }
        @keyframes spinSlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glass-header {
            background: rgba(12,12,18,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 110;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #b97cfc, #ff6b9d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .menu-icon {
            font-size: 1.6rem;
            cursor: pointer;
        }
        .side-menu {
            position: fixed;
            top: 0;
            right: -380px;
            width: 340px;
            height: 100vh;
            background: #111118ee;
            backdrop-filter: blur(20px);
            z-index: 200;
            transition: right 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
            padding: 28px 20px;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .side-menu.open { right: 0; }
        .profile-area {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #1a1a26;
            border-radius: 32px;
            padding: 16px;
        }
        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #2a2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .connect-btn {
            background: linear-gradient(135deg, #b97cfc, #ff6b9d);
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
        }
        .menu-links a {
            display: flex;
            gap: 14px;
            padding: 12px;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 24px;
        }
        .menu-links a:hover { background: rgba(185,124,252,0.2);}

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 30px 24px 100px;
            position: relative;
            z-index: 2;
        }
        .section {
            display: none;
            animation: fade 0.25s;
        }
        .section.active-section { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);}}

        .exchange-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 28px;
        }
        .exchange-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 18px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }
        .exchange-card:hover { border-color: var(--accent); transform: translateY(-3px);}
        .item-img {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2a2a38, #1f1f2e);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .games-dropdown {
            background: var(--card-bg);
            border-radius: 32px;
            margin-bottom: 28px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .games-header {
            padding: 20px 24px;
            background: #1f1f2e;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .games-content {
            display: none;
            padding: 20px;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }
        .games-content.open { display: grid; }
        .game-card {
            background: #13131c;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .game-card:hover { border-color: var(--accent); transform: translateY(-4px);}
        .match-panel {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 24px;
            margin-top: 24px;
            border: 1px solid var(--border);
        }
        .btn {
            background: linear-gradient(135deg, #b97cfc, #ff6b9d);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-secondary { background: #2a2a38; }
        .match-list {
            background: #0f0f16;
            border-radius: 28px;
            padding: 16px;
            max-height: 260px;
            overflow-y: auto;
        }
        .match-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            max-width: 400px;
            margin: 20px auto;
            background: #2a2a3a;
            border-radius: 12px;
            overflow: hidden;
        }
        .chess-square {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            padding: 10px 24px;
            border-radius: 60px;
            z-index: 1000;
        }
        @media (max-width: 640px) {
            .exchange-grid { gap: 12px; }
            .item-img { width: 55px; height: 55px; font-size: 1.5rem;}
        }
    </style>
</head>
<body>
<div class="vortex"></div>

<div class="glass-header">
    <div class="logo">⚔️ EchoKnives</div>
    <i class="fas fa-bars menu-icon" id="menuToggleBtn"></i>
</div>

<div id="sideMenu" class="side-menu">
    <div class="profile-area" id="profilePreview">
        <div class="avatar" id="menuAvatar"><i class="fas fa-user"></i></div>
        <div><strong id="menuDisplay">Guest</strong><br><span id="menuUser">Not verified</span></div>
    </div>
    <div id="connectAccountBtn" class="connect-btn">🔗 Connect Roblox</div>
    <div class="menu-links">
        <a href="#" data-section="exchange"><i class="fas fa-exchange-alt"></i> Exchange</a>
        <a href="#" data-section="games"><i class="fas fa-gamepad"></i> Games</a>
    </div>
    <div style="margin-top: auto;"><button id="logoutBtn" class="btn-secondary btn" style="width:100%;">🚪 Logout</button></div>
</div>

<div class="container">
    <div id="exchangeSection" class="section active-section">
        <h2>💱 Currency Exchange</h2>
        <div class="exchange-grid" id="exchangeGrid"></div>
    </div>

    <div id="gamesSection" class="section">
        <div class="games-dropdown">
            <div class="games-header" id="gamesHeader">
                <span><i class="fas fa-gamepad"></i> Arcade Games</span>
                <i class="fas fa-chevron-down" id="gamesChevron"></i>
            </div>
            <div class="games-content" id="gamesContent">
                <div class="game-card" data-game="chess"><i class="fas fa-chess-queen" style="font-size: 2rem;"></i><h3>Chess</h3><p>Practice vs Bot | PvP</p></div>
                <div class="game-card" data-game="checkers"><i class="fas fa-draughtsman" style="font-size: 2rem;"></i><h3>Checkers</h3><p>Classic PvP</p></div>
                <div class="game-card" data-game="flag"><i class="fas fa-flag-checkered" style="font-size: 2rem;"></i><h3>Guess The Flag</h3><p>Race vs opponent</p></div>
                <div class="game-card" data-game="logo"><i class="fas fa-trademark" style="font-size: 2rem;"></i><h3>Guess The Logo</h3><p>Test knowledge</p></div>
            </div>
        </div>
        <div id="gameActivePanel" style="display: none;">
            <div class="match-panel"><h3 id="gameActiveTitle">Game</h3><div id="gameSpecificUI"></div><button id="closeGameBtn" class="btn-secondary btn">Close Game</button></div>
        </div>
        <div id="gameLobbyPanel">
            <div class="match-panel"><h3>⚔️ Global Matchmaking</h3><div class="btn-group" style="display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0;"><button id="createPvpMatchBtn" class="btn">➕ Create Match</button><button id="refreshLobbyBtn" class="btn btn-secondary">🔄 Refresh</button></div><div id="matchListContainer" class="match-list">Loading matches...</div></div>
        </div>
    </div>
</div>

<div id="connectModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); backdrop-filter:blur(12px); display:none; align-items:center; justify-content:center; z-index:1000;"><div style="background:#1a1a26; border-radius:40px; padding:32px; max-width:400px; width:90%; text-align:center;"><h3>🔗 Connect Roblox</h3><input type="text" id="robloxUserInput" placeholder="Username" style="width:100%; margin:16px 0; padding:12px; border-radius:60px; background:#2a2a38; border:none; color:white;"><button id="submitRobloxConnect" class="btn">Continue</button><p id="connectCancel" style="margin-top:16px; cursor:pointer;">Cancel</p></div></div>

<script type="module">
    import { getFirestore, collection, addDoc, query, where, onSnapshot, updateDoc, doc, deleteDoc, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    const db = window.db;
    
    // App State
    let verifiedUser = null;
    let credits = 1850;
    let currentGameType = null;
    let unsubscribeMatches = null;
    
    let items = [
        { id:1, name:"Harvester", value:2200, emoji:"⚔️" },
        { id:2, name:"Batwing", value:140, emoji:"🦇" },
        { id:3, name:"Luger", value:165, emoji:"🔫" },
        { id:4, name:"Corrupt", value:1250, emoji:"💀" }
    ];
    
    // Helper functions
    function showToast(msg) { let t=document.createElement("div"); t.className="toast"; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }
    function confettiFX() { canvasConfetti({ particleCount:80, spread:60, colors:['#b97cfc','#ff6b9d'] }); }
    function saveData() { localStorage.setItem("echoknives_data", JSON.stringify({ verifiedUser, credits })); }
    function loadData() { let d = localStorage.getItem("echoknives_data"); if(d) { let data = JSON.parse(d); verifiedUser = data.verifiedUser; credits = data.credits ?? 1850; } updateMenuUI(); if(verifiedUser) renderExchange(); }
    
    // Exchange
    function renderExchange() {
        let container = document.getElementById("exchangeGrid");
        if(!container) return;
        container.innerHTML = items.map(item => `<div class="exchange-card" onclick="window.handleExchange(${item.id})"><div class="item-img">${item.emoji}</div><div class="item-details"><div class="item-name">${item.name}</div><div class="item-price">${item.value} credits</div></div></div>`).join('');
    }
    window.handleExchange = (id) => {
        if(!verifiedUser) { showToast("Connect Roblox account first"); window.openLoginModal(); return; }
        let item = items.find(i=>i.id===id);
        if(credits >= item.value) { credits -= item.value; showToast(`✅ Withdrawn ${item.name}`); }
        else { credits += item.value; showToast(`📥 Deposited +${item.value} credits`); confettiFX(); }
        saveData();
    };
    
    // Firebase Matchmaking - GLOBAL
    async function loadMatches() {
        if(unsubscribeMatches) unsubscribeMatches();
        const q = query(collection(db, "matches"), where("status", "==", "waiting"), orderBy("createdAt", "desc"), limit(50));
        unsubscribeMatches = onSnapshot(q, (snapshot) => {
            const matches = [];
            snapshot.forEach(doc => { matches.push({ id: doc.id, ...doc.data() }); });
            displayMatches(matches);
        });
    }
    
    function displayMatches(matches) {
        let container = document.getElementById("matchListContainer");
        if(!container) return;
        if(matches.length === 0) { container.innerHTML = "<div style='text-align:center;'>⚡ No active matches — create one</div>"; return; }
        container.innerHTML = matches.map(m => `<div class="match-item"><span><i class="fas fa-user"></i> ${m.creator} (${m.gameType})</span><button class="btn-secondary" style="padding:4px 12px;" onclick="window.joinMatch('${m.id}')">Join</button></div>`).join('');
    }
    
    window.createMatch = async () => {
        if(!verifiedUser) { showToast("Connect Roblox first"); window.openLoginModal(); return; }
        if(!currentGameType) { showToast("Select a game from the Games section first"); return; }
        await addDoc(collection(db, "matches"), {
            gameType: currentGameType,
            creator: verifiedUser.displayName,
            creatorId: verifiedUser.username,
            createdAt: Date.now(),
            status: "waiting",
            players: [verifiedUser.username]
        });
        showToast(`${currentGameType} match created! Waiting for opponent...`);
    };
    
    window.joinMatch = async (matchId) => {
        if(!verifiedUser) { showToast("Connect Roblox first"); return; }
        const matchRef = doc(db, "matches", matchId);
        await updateDoc(matchRef, {
            status: "playing",
            players: [verifiedUser.username]
        });
        showToast("Joined match! Game starting...");
        loadMatches();
    };
    
    // Chess Bot (Practice)
    let chessGame = null, selectedSquare = null;
    function initChessBot() {
        chessGame = { board: [ ['r','n','b','q','k','b','n','r'], ['p','p','p','p','p','p','p','p'], ['','','','','','','',''], ['','','','','','','',''], ['','','','','','','',''], ['','','','','','','',''], ['P','P','P','P','P','P','P','P'], ['R','N','B','Q','K','B','N','R'] ], turn: 'white' };
        drawChessBoardBot();
        document.getElementById("gameActiveTitle").innerHTML = "♟️ Chess (Practice vs Bot)";
        document.getElementById("gameSpecificUI").innerHTML = `<div id="chessStatus" style="text-align:center;">Your turn</div><div id="chessBoardContainer" class="chess-board"></div><button id="resetChessBtn" class="btn-secondary btn">New Game</button>`;
        attachChessEvents();
        drawChessBoardBot();
    }
    function drawChessBoardBot() {
        let container = document.getElementById("chessBoardContainer");
        if(!container) return;
        container.innerHTML = "";
        let pieceMap = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙','':'' };
        for(let i=0;i<8;i++) {
            for(let j=0;j<8;j++) {
                let piece = chessGame.board[i][j];
                let sq = document.createElement("div");
                sq.className = "chess-square";
                sq.style.backgroundColor = (i+j)%2===0 ? "#e8d0a0" : "#6b4c3b";
                if(selectedSquare && selectedSquare.row===i && selectedSquare.col===j) sq.style.backgroundColor = "#b97cfc";
                sq.innerText = pieceMap[piece];
                sq.onclick = () => handleChessMove(i,j);
                container.appendChild(sq);
            }
        }
    }
    function handleChessMove(row,col) {
        if(!chessGame || chessGame.turn !== 'white') return;
        if(selectedSquare === null) {
            let piece = chessGame.board[row][col];
            if(piece && piece === piece.toUpperCase()) { selectedSquare = { row, col }; drawChessBoardBot(); }
            return;
        }
        let from = selectedSquare, to = { row, col };
        chessGame.board[to.row][to.col] = chessGame.board[from.row][from.col];
        chessGame.board[from.row][from.col] = '';
        chessGame.turn = 'black';
        selectedSquare = null;
        drawChessBoardBot();
        setTimeout(() => botMove(), 400);
    }
    function botMove() {
        if(!chessGame || chessGame.turn !== 'black') return;
        let pieces = [];
        for(let i=0;i<8;i++) for(let j=0;j<8;j++) { let p = chessGame.board[i][j]; if(p && p !== p.toUpperCase()) pieces.push({row:i,col:j,piece:p}); }
        if(pieces.length===0) return;
        let randomPiece = pieces[Math.floor(Math.random()*pieces.length)];
        for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
            let nr = randomPiece.row+dr, nc = randomPiece.col+dc;
            if(nr>=0 && nr<8 && nc>=0 && nc<8 && chessGame.board[nr][nc]==='') {
                chessGame.board[nr][nc] = randomPiece.piece;
                chessGame.board[randomPiece.row][randomPiece.col] = '';
                chessGame.turn = 'white';
                drawChessBoardBot();
                return;
            }
        }
        chessGame.turn = 'white';
        drawChessBoardBot();
    }
    function attachChessEvents() { document.getElementById("resetChessBtn")?.addEventListener("click",()=>{ initChessBot(); }); }
    
    // UI Navigation
    document.querySelectorAll(".game-card").forEach(card => {
        card.addEventListener("click", () => {
            currentGameType = card.getAttribute("data-game");
            if(currentGameType === 'chess') {
                document.getElementById("gameActivePanel").style.display = "block";
                document.getElementById("gameLobbyPanel").style.display = "none";
                initChessBot();
            } else {
                showToast(`${currentGameType.toUpperCase()} — Create or join a global match!`);
                document.getElementById("gameActivePanel").style.display = "none";
                document.getElementById("gameLobbyPanel").style.display = "block";
                loadMatches();
            }
        });
    });
    
    document.getElementById("createPvpMatchBtn")?.addEventListener("click", () => window.createMatch());
    document.getElementById("refreshLobbyBtn")?.addEventListener("click", () => loadMatches());
    document.getElementById("closeGameBtn")?.addEventListener("click", () => {
        document.getElementById("gameActivePanel").style.display = "none";
        document.getElementById("gameLobbyPanel").style.display = "block";
        currentGameType = null;
    });
    
    // Games dropdown
    let gamesOpen = false;
    document.getElementById("gamesHeader").onclick = () => {
        gamesOpen = !gamesOpen;
        document.getElementById("gamesContent").classList.toggle("open", gamesOpen);
        document.getElementById("gamesChevron").style.transform = gamesOpen ? "rotate(180deg)" : "";
    };
    
    // Roblox connection
    async function connectRoblox(username) {
        await new Promise(r=>setTimeout(r,600));
        verifiedUser = { username, displayName: username, avatarUrl: `https://ui-avatars.com/api/?name=${username[0]}&background=b97cfc&color=fff` };
        updateMenuUI(); saveData(); renderExchange(); showToast(`✅ Connected as ${username}`); confettiFX();
        return true;
    }
    function updateMenuUI() {
        if(verifiedUser) {
            document.getElementById("menuDisplay").innerText = verifiedUser.displayName;
            document.getElementById("menuUser").innerText = "@"+verifiedUser.username;
            document.getElementById("menuAvatar").innerHTML = `<img src="${verifiedUser.avatarUrl}" style="width:100%; border-radius:50%;">`;
            document.getElementById("connectAccountBtn").style.display = "none";
        } else {
            document.getElementById("menuDisplay").innerText = "Guest";
            document.getElementById("menuUser").innerText = "Not connected";
            document.getElementById("menuAvatar").innerHTML = `<i class="fas fa-user"></i>`;
            document.getElementById("connectAccountBtn").style.display = "block";
        }
    }
    window.openLoginModal = () => document.getElementById("connectModal").style.display = "flex";
    document.getElementById("connectAccountBtn").onclick = window.openLoginModal;
    document.getElementById("connectCancel").onclick = () => document.getElementById("connectModal").style.display = "none";
    document.getElementById("submitRobloxConnect").onclick = async () => { let user=document.getElementById("robloxUserInput").value.trim(); if(user) { await connectRoblox(user); document.getElementById("connectModal").style.display="none"; } };
    document.getElementById("logoutBtn")?.addEventListener("click", () => { verifiedUser=null; credits=1850; saveData(); updateMenuUI(); renderExchange(); showToast("Logged out"); location.reload(); });
    
    // Navigation
    document.querySelectorAll(".menu-links a").forEach(link => {
        link.addEventListener("click", (e) => {
            e.preventDefault();
            let section = link.getAttribute("data-section");
            document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active-section"));
            document.getElementById(`${section}Section`).classList.add("active-section");
            document.getElementById("sideMenu").classList.remove("open");
            if(section === "games") loadMatches();
        });
    });
    document.getElementById("menuToggleBtn").onclick = () => document.getElementById("sideMenu").classList.toggle("open");
    
    loadData();
    renderExchange();
</script>
</body>
